    border-radius: 50%;

<script>
(async function() {
    console.log('📇 Module ABF Contact - Init');
    // ==========================================
    // VARIABLES D'ÉTAT
    // ==========================================
    let hasConjoint = false;
    let currentEnfantsCount = 0;
    let enfantsData = {};
    let clientId = null;
    let isInitialLoad = true;  // Flag pour savoir si c'est le premier chargement
    
    // ==========================================
    // 1. DÉFINIR TOUTES LES FONCTIONS D'ABORD
    // ==========================================
    
    window.toggleConjoint = function() {
        const toggle = document.getElementById('conjointToggle');
        hasConjoint = !hasConjoint;
        toggle.classList.toggle('active', hasConjoint);
        
        document.querySelectorAll('.conjoint-tab').forEach(tab => {
            tab.classList.toggle('visible', hasConjoint);
        });
        
        if (!hasConjoint) {
            window.switchContactTab('client');
        }
        
        // Marquer comme non enregistré
        if (!isInitialLoad) {
            FINOX_NAV.markAsUnsaved();
        }
        
        console.log('Toggle conjoint:', hasConjoint);
    };
    
    window.switchContactTab = function(tabId) {
        const tabsContainer = document.getElementById('contactTabs');
        const contentsContainer = document.getElementById('contactTabContents');

        tabsContainer.querySelectorAll('.person-tab').forEach(tab => {

    function updateEnfantsContactTabs(count) {
        console.log('🔄 updateEnfantsContactTabs appelé avec count:', count, 'enfantsData:', JSON.stringify(enfantsData));
        
        const tabsContainer = document.getElementById('contactTabs');
        const contentsContainer = document.getElementById('contactTabContents');

        // Supprimer les onglets enfants existants
        document.querySelectorAll('#contactTabs .person-tab.enfant-tab').forEach(tab => tab.remove());
        document.querySelectorAll('#contactTabContents .tab-content.enfant-content').forEach(content => content.remove());

        // Créer les nouveaux onglets
        for (let i = 1; i <= count; i++) {
            const savedData = enfantsData[i] || { prenom: '', nom: '', date_naissance: '', sexe: '' };
            console.log(`👶 Création onglet enfant ${i}:`, savedData);
            const enfantName = savedData.prenom || `Enfant ${i}`;

            const tab = document.createElement('div');
            tab.className = 'person-tab enfant-tab';
            tab.dataset.tab = `enfant${i}`;
            tab.onclick = () => window.switchContactTab(`enfant${i}`);
            tab.innerHTML = `<span class="tab-icon">👶</span><span id="contactTabEnfant${i}Name">${enfantName}</span>`;
            // Insérer avant l'onglet Relations pour garder Relations toujours en dernier
            const relTab = tabsContainer.querySelector('.person-tab[data-tab="relations"]');
            if (relTab) {
                tabsContainer.insertBefore(tab, relTab);
            } else {
                tabsContainer.appendChild(tab);
            }

            const content = document.createElement('div');
            content.className = 'tab-content enfant-content';
            content.id = `contactEnfant${i}Content`;
            content.innerHTML = `
                <div class="enfant-content-header">
                    <div class="enfant-avatar">👶</div>
                    <div>
                        <h4 id="enfant${i}Title">${enfantName}</h4>
                        <p>Informations de l'enfant ${i}</p>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Prénom *</label>
                        <input type="text" id="enfant${i}Prenom" value="${savedData.prenom}" oninput="updateEnfantName(${i})">
                    </div>
                    <div class="form-group">
                        <label>Nom de famille</label>
                        <input type="text" id="enfant${i}Nom" value="${savedData.nom}">
                    </div>
                    <div class="form-group">
                        <label>Date de naissance *</label>
                        <input type="date" id="enfant${i}DOB" value="${savedData.date_naissance}">
                    </div>
                    <div class="form-group">
                        <label>Sexe</label>
                        <select id="enfant${i}Sexe">
                            <option value="">Sélectionner...</option>
                            <option value="Garçon" ${savedData.sexe === 'Garçon' ? 'selected' : ''}>Garçon</option>
                            <option value="Fille" ${savedData.sexe === 'Fille' ? 'selected' : ''}>Fille</option>
                        </select>
                    </div>
                </div>
            `;
            contentsContainer.appendChild(content);
        }

        // Si l'onglet actif a été supprimé, revenir au client
        const activeTab = tabsContainer.querySelector('.person-tab.active');
        if (activeTab && activeTab.classList.contains('enfant-tab')) {
            const tabNum = parseInt(activeTab.dataset.tab.replace('enfant', ''));
            if (tabNum > count) {
                window.switchContactTab('client');
            }
        }
    }

    let isSaving = false;  // Protection contre double sauvegarde
    
    window.saveModuleData = async function() {
        // Empêcher double sauvegarde simultanée
        if (isSaving) {
            console.log('⚠️ Sauvegarde déjà en cours, skip');
            return { success: true };
        }
        isSaving = true;
        
        console.log('💾 saveModuleData Contact appelé');
        
        const nbEnfants = parseInt(document.getElementById('nombreEnfants').value) || 0;

        // Récupérer abf_data existant pour ne pas l'écraser
        const currentClient = FINOX.getClientData();
        const currentAbfData = currentClient?.abf_data || {};
        
        const clientUpdate = {
            first_name: document.getElementById('clientPrenom').value,
            last_name: document.getElementById('clientNom').value,
            email: document.getElementById('clientEmail').value,
            phone: document.getElementById('clientTelephone').value,
            date_of_birth: document.getElementById('clientDOB').value || null,
            sex: document.getElementById('clientSex').value,
            smoker: document.getElementById('clientSmoker').value === 'true',
            etat_civil: document.getElementById('clientEtatCivil').value || null,
            testament: document.getElementById('clientTestament').value || null,

            has_conjoint: hasConjoint,
            // Toujours sauvegarder les valeurs du conjoint, même si toggle est off
            // (permet de récupérer les données si on réactive le conjoint)
            conjoint_first_name: document.getElementById('conjointPrenom').value || null,
            conjoint_last_name: document.getElementById('conjointNom').value || null,
            conjoint_email: document.getElementById('conjointEmail').value || null,
            conjoint_phone: document.getElementById('conjointPhone').value || null,
            conjoint_dob: document.getElementById('conjointDOB').value || null,
            conjoint_sex: document.getElementById('conjointSex').value || null,
            conjoint_smoker: document.getElementById('conjointSmoker').value === 'true',
            conjoint_etat_civil: document.getElementById('conjointEtatCivil').value || null,
            conjoint_testament: document.getElementById('conjointTestament').value || null,

            nombre_enfants: nbEnfants,
            
            abf_data: {
                ...currentAbfData
            }
        };
        
        try {
            const { error: clientError } = await FINOX.supabase
                .from('clients')
                .update(clientUpdate)
                .eq('id', clientId);
            
            if (clientError) throw clientError;

            // ★ Mise à jour IMMÉDIATE du cache en mémoire (évite les données stales lors du changement de module)
            FINOX.updateClientDataCache(clientUpdate);
            console.log('💾 Cache client mis à jour immédiatement');

            // Sauvegarder les enfants — mise à jour intelligente pour préserver les données d'assurance
            const { data: existingEnfants } = await FINOX.supabase
                .from('abf_enfants')
                .select('id, ordre')
                .eq('client_id', clientId)
                .order('ordre');

            const existingByOrdre = {};
            (existingEnfants || []).forEach(e => { existingByOrdre[e.ordre] = e.id; });

            if (nbEnfants > 0) {
                for (let i = 1; i <= nbEnfants; i++) {
                    const prenomEl = document.getElementById(`enfant${i}Prenom`);
                    const nomEl = document.getElementById(`enfant${i}Nom`);
                    const dobEl = document.getElementById(`enfant${i}DOB`);
                    const sexeEl = document.getElementById(`enfant${i}Sexe`);

                    // PROTECTION: ne jamais écraser avec des placeholders si le DOM n'existe pas
                    if (!prenomEl) {
                        console.warn(`⚠️ DOM enfant ${i} inexistant, skip update pour préserver les données`);
                        if (existingByOrdre[i]) delete existingByOrdre[i];
                        continue;
                    }

                    const contactFields = {
                        prenom: prenomEl.value || `Enfant ${i}`,
                        nom: nomEl?.value || '',
                        date_naissance: dobEl?.value || null,
                        sexe: sexeEl?.value || '',
                        ordre: i,
                        a_charge: true
                    };

                    if (existingByOrdre[i]) {
                        // Mettre à jour (préserve protection_vie_active, protection_mg_active, etc.)
                        await FINOX.supabase
                            .from('abf_enfants')
                            .update(contactFields)
                            .eq('id', existingByOrdre[i]);
                        delete existingByOrdre[i];
                    } else {
                        // Nouvel enfant
                        await FINOX.supabase
                            .from('abf_enfants')
                            .insert({ client_id: clientId, ...contactFields });
                    }
                }
            }

            // Supprimer les enfants en trop (ceux qui ne sont plus dans la liste)
            const idsToDelete = Object.values(existingByOrdre);
            if (idsToDelete.length > 0) {
                await FINOX.supabase
                    .from('abf_enfants')
                    .delete()
                    .in('id', idsToDelete);
            }
            
            // Refresh complet depuis la DB + invalider tout cache de requête stale
            FINOX.invalidateCache();
            await FINOX.loadClientData();

            // Auto-sync contact vers RingCentral (silencieux, ne bloque pas)
            if (typeof syncClientToRingCentral === 'function') {
                syncClientToRingCentral(clientId); // fire-and-forget
            }

            // Auto-créer opportunité testament si nécessaire
            await checkTestamentOpportunity();

            isSaving = false;
            return { success: true };
        } catch (err) {
            console.error('Erreur sauvegarde:', err);
            isSaving = false;
            return { success: false, error: err.message };
        }
    };

    // ==========================================
    // 5b. AUTO-CRÉATION OPPORTUNITÉ TESTAMENT
    // ==========================================
    async function checkTestamentOpportunity() {
        try {
            const clientTest = document.getElementById('clientTestament').value;
            const conjointTest = document.getElementById('conjointTestament').value;

            const needsOpp = (val) => val === 'aucun' || val === 'olographe' || val === 'notarie_a_reviser';

            const clientNeeds = needsOpp(clientTest);
            const conjointNeeds = hasConjoint && needsOpp(conjointTest);

            if (!clientNeeds && !conjointNeeds) return;

            // Vérifier s'il existe déjà une opportunité testament active
            const { data: existing } = await FINOX.supabase
                .from('client_opportunities')
                .select('id,stage')
                .eq('client_id', clientId)
                .eq('category', 'testament');

            const activeStages = ['active', 'identified', 'qualified', 'action_planned', 'in_progress', 'proposal_sent'];
            if (existing && existing.some(o => activeStages.includes(o.stage))) return;

            // Prénoms
            const clientPrenom = document.getElementById('clientPrenom').value || 'Client';
            const conjointPrenom = document.getElementById('conjointPrenom').value || 'Conjoint';

            // Construire le titre avec les prénoms
            let titleNames = [];
            if (clientNeeds) titleNames.push(clientPrenom);
            if (conjointNeeds) titleNames.push(conjointPrenom);
            const title = 'Testament à faire — ' + titleNames.join(' & ');

            // Construire la description détaillée
            const labels = { aucun: 'Aucun testament', olographe: 'Testament olographe', notarie_a_reviser: 'Notarié à réviser' };
            let desc = [];
            if (clientNeeds) desc.push(clientPrenom + ': ' + labels[clientTest]);
            if (conjointNeeds) desc.push(conjointPrenom + ': ' + labels[conjointTest]);

            // Récupérer le profil conseiller pour organization_id
            const profile = await FINOX.loadUserProfile();
            if (!profile) return;

            const { error } = await FINOX.supabase
                .from('client_opportunities')
                .insert({
                    organization_id: profile.organization_id,
                    client_id: clientId,
                    conseiller_id: profile.id,
                    category: 'testament',
                    title,
                    description: desc.join('\n'),
                    stage: 'active',
                    priority: 'normal',
                    source: 'auto'
                });

            if (error) {
                console.warn('⚠️ Erreur création opp testament:', error);
                return;
            }

            FINOX.showNotification('📜 Opportunité « ' + title + ' » créée', 'success');
            FINOX.addTimelineEntry('opportunity', '📜 Opportunité auto: ' + title, desc.join(' | '));
        } catch (err) {
            console.warn('⚠️ checkTestamentOpportunity error:', err);
        }
    }

    async function loadRelations() {
        if (!FINOX.CLIENT_ID || !FINOX.supabase) return;
        const container = document.getElementById('relList');
        const badge = document.getElementById('relCountBadge');
        if (!container) return;

        try {
            const { data: rels, error } = await FINOX.supabase
                .from('client_relationships')
                .select('*')
                .eq('client_id', FINOX.CLIENT_ID)
                .order('created_at', { ascending: false });

            if (error) throw error;
            if (!rels || rels.length === 0) {
                container.innerHTML = '<div class="rel-empty">Aucune relation. Cliquez sur + Ajouter pour relier ce contact.</div>';
                if (badge) badge.style.display = 'none';
                return;
            }

            // Badge compteur
            if (badge) {
                badge.textContent = rels.length;
                badge.style.display = 'inline';
            }

            const otherIds = rels.map(r => r.related_client_id);
            const { data: contacts } = await FINOX.supabase
                .from('clients')
                .select('id, first_name, last_name, type_contact')
                .in('id', otherIds);

            const contactMap = {};
            (contacts || []).forEach(c => contactMap[c.id] = c);

            container.innerHTML = rels.map(r => {
                const otherId = r.related_client_id;
                const contact = contactMap[otherId];
                if (!contact) return '';

                const relType = RELATION_TYPES[r.relationship_type] || { icon: '📎', label: r.relationship_type };
                const typeConfig = REL_TYPE_CONTACT_CONFIG[contact.type_contact] || { icon: '👤', label: '' };
                const fullName = [contact.first_name, contact.last_name].filter(Boolean).join(' ') || 'Sans nom';
                const labelText = r.relationship_label || relType.label;

                return `<div class="rel-item" onclick="navigateToRelation('${otherId}')">
                    <div class="rel-item-avatar">${relType.icon}</div>
                    <div class="rel-item-info">
                        <div class="rel-item-name">${fullName}</div>
                        <div class="rel-item-type">${labelText}</div>
                    </div>
                    <div class="rel-item-badge">${typeConfig.icon} ${typeConfig.label || contact.type_contact || ''}</div>
                    <button class="rel-item-delete" onclick="event.stopPropagation(); deleteRelation('${r.id}')" title="Supprimer">🗑️</button>
                </div>`;
            }).filter(Boolean).join('');

        } catch (err) {
            console.error('Erreur chargement relations:', err);
            container.innerHTML = '<div class="rel-empty">Erreur de chargement</div>';
        }
    }

    window.openRelationModal = function() {
        selectedRelContact = null;
        document.getElementById('relSearchInput').value = '';
        document.getElementById('relSearchResults').innerHTML = '<div class="rel-no-results">Tapez un nom pour chercher...</div>';
        document.getElementById('relTypeSelect').value = '';
        document.getElementById('relLabelInput').value = '';
        document.getElementById('relConfirmBtn').disabled = true;
        document.getElementById('relModalOverlay').style.display = 'flex';
        setTimeout(() => document.getElementById('relSearchInput').focus(), 100);
    };

    window.closeRelationModal = function() {
        document.getElementById('relModalOverlay').style.display = 'none';
    };

    window.searchRelContacts = function(query) {
        clearTimeout(relSearchTimeout);
        const resultsDiv = document.getElementById('relSearchResults');

        if (!query || query.length < 2) {
            resultsDiv.innerHTML = '<div class="rel-no-results">Tapez au moins 2 caractères...</div>';
            return;
        }

        relSearchTimeout = setTimeout(async () => {
            try {
                const q = query.trim().toLowerCase();
                const { data, error } = await FINOX.supabase
                    .from('clients')
                    .select('id, first_name, last_name, type_contact')
                    .eq('organization_id', '7572c420-6c4d-4313-8284-7ba5a4351f2c')
                    .neq('id', FINOX.CLIENT_ID)
                    .or(`first_name.ilike.%${q}%,last_name.ilike.%${q}%`)
                    .order('last_name')
                    .limit(15);

                if (error) throw error;

                if (!data || data.length === 0) {
                    resultsDiv.innerHTML = '<div class="rel-no-results">Aucun contact trouvé</div>';
                    return;
                }

                resultsDiv.innerHTML = data.map(c => {
                    const typeConfig = REL_TYPE_CONTACT_CONFIG[c.type_contact] || { icon: '👤', label: c.type_contact || '' };
                    const fullName = [c.first_name, c.last_name].filter(Boolean).join(' ');
                    return `<div class="rel-search-item ${selectedRelContact?.id === c.id ? 'selected' : ''}" onclick="selectRelContact('${c.id}', '${fullName.replace(/'/g, "\\'")}', '${c.type_contact || ''}')">
                        <span>${typeConfig.icon}</span>
                        <span class="rel-search-item-name">${fullName}</span>
                        <span class="rel-search-item-type">${typeConfig.label || ''}</span>
                    </div>`;
                }).join('');

            } catch (err) {
                console.error('Erreur recherche:', err);
                resultsDiv.innerHTML = '<div class="rel-no-results">Erreur de recherche</div>';
            }
        }, 300);
    };

    window.selectRelContact = function(id, name, typeContact) {
        selectedRelContact = { id, name, typeContact };
        document.querySelectorAll('.rel-search-item').forEach(el => el.classList.remove('selected'));
        event.currentTarget.classList.add('selected');
        updateRelConfirmBtn();
    };

    function updateRelConfirmBtn() {
        const hasContact = !!selectedRelContact;
        const hasType = !!document.getElementById('relTypeSelect').value;
        document.getElementById('relConfirmBtn').disabled = !(hasContact && hasType);
    }

    document.getElementById('relTypeSelect')?.addEventListener('change', updateRelConfirmBtn);

    window.confirmAddRelation = async function() {
        if (!selectedRelContact) return;
        const relType = document.getElementById('relTypeSelect').value;
        if (!relType) return;
        const label = document.getElementById('relLabelInput').value.trim() || null;

        try {
            const { error: err1 } = await FINOX.supabase
                .from('client_relationships')
                .insert({
                    client_id: FINOX.CLIENT_ID,
                    related_client_id: selectedRelContact.id,
                    relationship_type: relType,
                    relationship_label: label,
                    organization_id: '7572c420-6c4d-4313-8284-7ba5a4351f2c',
                    created_by: (await FINOX.supabase.auth.getUser()).data.user?.id
                });

            if (err1) {
                if (err1.code === '23505') {
                    FINOX.showNotification('Cette relation existe déjà', 'error');
                    return;
                }
                throw err1;
            }

            // Créer la relation inverse (bidirectionnelle)
            const { error: err2 } = await FINOX.supabase
                .from('client_relationships')
                .insert({
                    client_id: selectedRelContact.id,
                    related_client_id: FINOX.CLIENT_ID,
                    relationship_type: relType,
                    relationship_label: label,
                    organization_id: '7572c420-6c4d-4313-8284-7ba5a4351f2c',
                    created_by: (await FINOX.supabase.auth.getUser()).data.user?.id
                });

            if (err2 && err2.code !== '23505') console.warn('Relation inverse:', err2);

            FINOX.showNotification(`Relation ajoutée: ${selectedRelContact.name}`, 'success');
            closeRelationModal();
            loadRelations();

        } catch (err) {
            console.error('Erreur ajout relation:', err);
            FINOX.showNotification('Erreur: ' + (err.message || "Impossible d'ajouter"), 'error');
        }
    };

    window.deleteRelation = async function(relId) {
        if (!await FINOX.confirm('Supprimer cette relation?')) return;

        try {
            const { data: rel } = await FINOX.supabase
                .from('client_relationships')
                .select('*')
                .eq('id', relId)
                .single();

            if (rel) {
                await FINOX.supabase.from('client_relationships').delete().eq('id', relId);
                await FINOX.supabase
                    .from('client_relationships')
                    .delete()
                    .eq('client_id', rel.related_client_id)
                    .eq('related_client_id', rel.client_id)
                    .eq('relationship_type', rel.relationship_type);
            }

            FINOX.showNotification('Relation supprimée', 'success');
            loadRelations();

        } catch (err) {
            console.error('Erreur suppression:', err);
            FINOX.showNotification('Erreur suppression', 'error');
        }
    };

    window.navigateToRelation = function(relClientId) {
        window.location.href = 'abf.html?client=' + relClientId;
    };

    // Charger les relations au démarrage
    loadRelations();

    console.log('✅ Module ABF Contact chargé');
})();
</script>
