    // ==========================================
    
    window.switchMaladieTab = function(tab) {
        document.querySelectorAll('#maladieTabs .person-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`#maladieTabs .person-tab[data-tab="${tab}"]`)?.classList.add('active');
        
        // Cacher tous les contenus
        document.getElementById('maladieClientContent').classList.remove('active');
        document.getElementById('maladieConjointContent').classList.remove('active');
        document.querySelectorAll('[id^="maladieEnfant"]').forEach(el => el.classList.remove('active'));
        
        // Afficher le bon contenu
        if (tab === 'client') {
            document.getElementById('maladieClientContent').classList.add('active');
        } else if (tab === 'conjoint') {
            document.getElementById('maladieConjointContent').classList.add('active');
        } else if (tab.startsWith('enfant-')) {
            document.getElementById(`maladieEnfant${tab.replace('enfant-', '')}Content`)?.classList.add('active');
        }
    };
    
    window.updateMGClient = function() {
        niveauClient = document.querySelector('input[name="niveau_mg_client"]:checked')?.value || 'tranquillite';
        FINOX_NAV.markAsUnsaved();
    };
    
    window.updateMGConjoint = function() {
        niveauConjoint = document.querySelector('input[name="niveau_mg_conjoint"]:checked')?.value || 'tranquillite';
        FINOX_NAV.markAsUnsaved();
    };
    
    function calculateAllMG() {
        // CLIENT
        const revenuMensuelClient = revenuNetClient / 12;
        
        const repit6Client = revenuMensuelClient * 6;
        const tranq12Client = revenuMensuelClient * 12;
        const confort24Client = revenuMensuelClient * 24;
        
        document.getElementById('mgRepitRevenuClient').textContent = FINOX.formatCurrency(repit6Client);
        document.getElementById('mgTranqRevenuClient').textContent = FINOX.formatCurrency(tranq12Client);
        document.getElementById('mgConfortRevenuClient').textContent = FINOX.formatCurrency(confort24Client);
        
        document.getElementById('mgRepitVigueurClient').textContent = '-' + FINOX.formatCurrency(mgVigueurClient);
        document.getElementById('mgTranqVigueurClient').textContent = '-' + FINOX.formatCurrency(mgVigueurClient);
        document.getElementById('mgConfortVigueurClient').textContent = '-' + FINOX.formatCurrency(mgVigueurClient);
        
        document.getElementById('besoinRepitClient').textContent = FINOX.formatCurrency(Math.max(0, repit6Client + 20000 - mgVigueurClient));
        document.getElementById('besoinTranquilliteClient').textContent = FINOX.formatCurrency(Math.max(0, tranq12Client + 45000 - mgVigueurClient));
        document.getElementById('besoinConfortClient').textContent = FINOX.formatCurrency(Math.max(0, confort24Client + 75000 - mgVigueurClient));
        
        // CONJOINT
        const revenuMensuelConjoint = revenuNetConjoint / 12;
        
        const repit6Conjoint = revenuMensuelConjoint * 6;
        const tranq12Conjoint = revenuMensuelConjoint * 12;
        const confort24Conjoint = revenuMensuelConjoint * 24;
        
        document.getElementById('mgRepitRevenuConjoint').textContent = FINOX.formatCurrency(repit6Conjoint);
        document.getElementById('mgTranqRevenuConjoint').textContent = FINOX.formatCurrency(tranq12Conjoint);
        document.getElementById('mgConfortRevenuConjoint').textContent = FINOX.formatCurrency(confort24Conjoint);
        
        document.getElementById('mgRepitVigueurConjoint').textContent = '-' + FINOX.formatCurrency(mgVigueurConjoint);
        document.getElementById('mgTranqVigueurConjoint').textContent = '-' + FINOX.formatCurrency(mgVigueurConjoint);
        document.getElementById('mgConfortVigueurConjoint').textContent = '-' + FINOX.formatCurrency(mgVigueurConjoint);
        
        document.getElementById('besoinRepitConjoint').textContent = FINOX.formatCurrency(Math.max(0, repit6Conjoint + 20000 - mgVigueurConjoint));
        document.getElementById('besoinTranquilliteConjoint').textContent = FINOX.formatCurrency(Math.max(0, tranq12Conjoint + 45000 - mgVigueurConjoint));
        document.getElementById('besoinConfortConjoint').textContent = FINOX.formatCurrency(Math.max(0, confort24Conjoint + 75000 - mgVigueurConjoint));
    }
    
    // Calcul du revenu de référence pour les enfants
    function getRevenuEnfant() {
        // Si deux parents avec revenu, prendre la moyenne
        if (revenuNetClient > 0 && revenuNetConjoint > 0) {
            return Math.round((revenuNetClient + revenuNetConjoint) / 2);
        }
        // Sinon prendre celui qui a un revenu
        return revenuNetClient > 0 ? revenuNetClient : revenuNetConjoint;
    }
    
    window.toggleProtectionMGEnfant = function(index) {
        const toggle = document.getElementById(`protectionMGEnfant${index}Toggle`);
        toggle.classList.toggle('active');
        const isActive = toggle.classList.contains('active');
        
        document.getElementById(`protectionMGEnfant${index}Content`).style.display = isActive ? 'block' : 'none';
        document.getElementById(`protectionMGEnfant${index}Disabled`).style.display = isActive ? 'none' : 'flex';
        
        // Mettre à jour les données de l'enfant
        if (enfantsData[index]) {
            enfantsData[index].protection_mg_active = isActive;
        }
        
        if (isActive) {
            calculateMGEnfant(index);
        }
        
        FINOX_NAV.markAsUnsaved();
    };
    
    window.updateMGEnfant = function(index) {
        if (enfantsData[index]) {
            enfantsData[index].mg_niveau = document.querySelector(`input[name="niveau_mg_enfant${index}"]:checked`)?.value || 'tranquillite';
        }
        FINOX_NAV.markAsUnsaved();
    };
    
    window.calculateMGEnfant = function(index) {
        const revenuEnfant = getRevenuEnfant();
        const revenuMensuel = revenuEnfant / 12;
        const vigueur = enfantsData[index] ? (enfantsMGVigueur[enfantsData[index].prenom] || 0) : 0;
        
        const repit6 = revenuMensuel * 6;
        const tranq12 = revenuMensuel * 12;
        const confort24 = revenuMensuel * 24;
        
        // Frais réduits pour enfants
        const fraisRepit = 20000;
        const fraisTranq = 35000;
        const fraisConfort = 50000;
        
        document.getElementById(`mgRepitRevenuEnfant${index}`).textContent = FINOX.formatCurrency(repit6);
        document.getElementById(`mgTranqRevenuEnfant${index}`).textContent = FINOX.formatCurrency(tranq12);
        document.getElementById(`mgConfortRevenuEnfant${index}`).textContent = FINOX.formatCurrency(confort24);
        
        document.getElementById(`mgRepitVigueurEnfant${index}`).textContent = '-' + FINOX.formatCurrency(vigueur);
        document.getElementById(`mgTranqVigueurEnfant${index}`).textContent = '-' + FINOX.formatCurrency(vigueur);
        document.getElementById(`mgConfortVigueurEnfant${index}`).textContent = '-' + FINOX.formatCurrency(vigueur);
        
        document.getElementById(`besoinRepitEnfant${index}`).textContent = FINOX.formatCurrency(Math.max(0, repit6 + fraisRepit - vigueur));
        document.getElementById(`besoinTranqEnfant${index}`).textContent = FINOX.formatCurrency(Math.max(0, tranq12 + fraisTranq - vigueur));
        document.getElementById(`besoinConfortEnfant${index}`).textContent = FINOX.formatCurrency(Math.max(0, confort24 + fraisConfort - vigueur));
    };

        const contentContainer = document.getElementById('enfantsTabsContent');
        
        // Supprimer anciens onglets enfants
        document.querySelectorAll('.enfant-tab').forEach(el => el.remove());
        contentContainer.innerHTML = '';
        
        const revenuEnfant = getRevenuEnfant();
        const hasConjoint = revenuNetConjoint > 0;
        const revenuInfo = hasConjoint ? 'Revenu: moyenne parents' : 'Revenu: parent principal';
        
        enfantsData.forEach((enfant, index) => {
            const enfantName = enfant.prenom || `Enfant ${index + 1}`;
            const vigueur = enfantsMGVigueur[enfant.prenom] || 0;
            const isActive = enfant.protection_mg_active || false;
            const niveau = enfant.mg_niveau || 'tranquillite';
            
            // Créer l'onglet
            const tab = document.createElement('div');
            tab.className = 'person-tab enfant-tab visible';
            tab.setAttribute('data-tab', `enfant-${index}`);
            tab.onclick = () => switchMaladieTab(`enfant-${index}`);
            tab.innerHTML = `<span class="tab-icon">👶</span><span>${enfantName}</span>`;
            tabsContainer.appendChild(tab);
            
            // Créer le contenu avec les 3 cartes
            const content = document.createElement('div');
            content.className = 'tab-content';
            content.id = `maladieEnfant${index}Content`;
            content.innerHTML = `
                <div class="mg-compact-container">
                    <!-- Toggle pour activer la protection -->
                    <div class="enfant-protection-toggle">
                        <div class="toggle-switch ${isActive ? 'active' : ''}" id="protectionMGEnfant${index}Toggle" onclick="toggleProtectionMGEnfant(${index})"></div>
                        <span style="font-weight: 600; color: var(--text-primary);">Activer protection maladie grave pour ${enfantName}</span>
                    </div>
                    
                    <!-- Contenu de protection -->
                    <div id="protectionMGEnfant${index}Content" style="display: ${isActive ? 'block' : 'none'};">
                        <!-- Header compact avec infos enfant -->
                        <div class="mg-compact-header">
                            <div class="enfant-content-header">
                                <div class="enfant-avatar">👶</div>
                                <div>
                                    <div style="font-weight: 600; color: #81C784; font-size: 13px;">${enfantName}</div>
                                    <div style="font-size: 10px; color: var(--text-muted);">${revenuInfo}</div>
                                </div>
                            </div>
                            <div class="vie-param-inline">
                                <label>Revenu réf. <span class="auto-tag">AUTO</span></label>
                                <input type="text" class="money-input" id="revenuNetEnfant${index}MG" value="${revenuEnfant}" readonly style="background:var(--bg-primary); opacity: 0.7; width:100px;">
                            </div>
                            <div class="vie-param-inline">
                                <label>En vigueur <span class="auto-tag">AUTO</span></label>
                                <input type="text" class="money-input" value="${vigueur}" readonly style="background:var(--bg-primary); opacity: 0.7; width:100px;">
                            </div>
                        </div>

                        <!-- 3 Cards compact -->
                        <div class="mg-cards-wrapper">
                            <div class="maladie-grave-cards">
                                <label class="mg-card mg-repit mg-selectable">
                                    <input type="radio" name="niveau_mg_enfant${index}" value="repit" ${niveau === 'repit' ? 'checked' : ''} onchange="updateMGEnfant(${index})">
                                    <div class="mg-card-inner">
                                        <div class="mg-card-header">
                                            <div class="mg-icon">🏥</div>
                                            <div class="mg-card-header-text">
                                                <h4>Répit Temporaire</h4>
                                                <span class="mg-duration">6 mois</span>
                                            </div>
                                        </div>
                                        <div class="mg-card-body">
                                            <div class="mg-formula">
                                                <div class="mg-row"><span>6 mois revenu</span><span id="mgRepitRevenuEnfant${index}">$0</span></div>
                                                <div class="mg-row"><span>+ Frais immédiats</span><span>$20,000</span></div>
                                                <div class="mg-row mg-minus"><span>- En vigueur</span><span id="mgRepitVigueurEnfant${index}">-$0</span></div>
                                            </div>
                                            <div class="mg-result">
                                                <div class="mg-result-label">Besoin</div>
                                                <div class="mg-result-value" id="besoinRepitEnfant${index}">$0</div>
                                            </div>
                                        </div>
                                        <div class="mg-card-footer">Transport, hébergement, aide</div>
                                        <div class="mg-selected-badge">✓</div>
                                    </div>
                                </label>

                                <label class="mg-card mg-tranquillite mg-selectable">
                                    <input type="radio" name="niveau_mg_enfant${index}" value="tranquillite" ${niveau === 'tranquillite' ? 'checked' : ''} onchange="updateMGEnfant(${index})">
                                    <div class="mg-card-inner">
                                        <div class="mg-card-header">
                                            <div class="mg-icon">💚</div>
                                            <div class="mg-card-header-text">
                                                <h4>Tranquillité d'Esprit</h4>
                                                <span class="mg-duration">12 mois</span>
                                            </div>
                                        </div>
                                        <div class="mg-card-body">
                                            <div class="mg-formula">
                                                <div class="mg-row"><span>12 mois revenu</span><span id="mgTranqRevenuEnfant${index}">$0</span></div>
                                                <div class="mg-row"><span>+ Soins & médic.</span><span>$35,000</span></div>
                                                <div class="mg-row mg-minus"><span>- En vigueur</span><span id="mgTranqVigueurEnfant${index}">-$0</span></div>
                                            </div>
                                            <div class="mg-result">
                                                <div class="mg-result-label">Besoin</div>
                                                <div class="mg-result-value" id="besoinTranqEnfant${index}">$0</div>
                                            </div>
                                        </div>
                                        <div class="mg-card-footer">Médicaments, soins, soutien</div>
                                        <div class="mg-selected-badge">✓</div>
                                    </div>
                                </label>

                                <label class="mg-card mg-confort mg-selectable">
                                    <input type="radio" name="niveau_mg_enfant${index}" value="confort" ${niveau === 'confort' ? 'checked' : ''} onchange="updateMGEnfant(${index})">
                                    <div class="mg-card-inner">
                                        <div class="mg-card-header">
                                            <div class="mg-icon">🏠</div>
                                            <div class="mg-card-header-text">
                                                <h4>Confort Complet</h4>
                                                <span class="mg-duration">24 mois</span>
                                            </div>
                                        </div>
                                        <div class="mg-card-body">
                                            <div class="mg-formula">
                                                <div class="mg-row"><span>24 mois revenu</span><span id="mgConfortRevenuEnfant${index}">$0</span></div>
                                                <div class="mg-row"><span>+ Couv. totale</span><span>$50,000</span></div>
                                                <div class="mg-row mg-minus"><span>- En vigueur</span><span id="mgConfortVigueurEnfant${index}">-$0</span></div>
                                            </div>
                                            <div class="mg-result">
                                                <div class="mg-result-label">Besoin</div>
                                                <div class="mg-result-value" id="besoinConfortEnfant${index}">$0</div>
                                            </div>
                                        </div>
                                        <div class="mg-card-footer">Adaptation, dettes, autonomie</div>
                                        <div class="mg-selected-badge">✓</div>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <!-- Légende compacte -->
                        <div class="mg-legend">
                            <div class="mg-legend-item"><span class="mg-legend-dot repit"></span> Frais immédiats</div>
                            <div class="mg-legend-item"><span class="mg-legend-dot tranquillite"></span> Qualité de vie</div>
                            <div class="mg-legend-item"><span class="mg-legend-dot confort"></span> Protection max</div>
                        </div>
                    </div>
                    
                    <!-- Message quand protection désactivée -->
                    <div id="protectionMGEnfant${index}Disabled" class="protection-disabled-msg" style="display: ${isActive ? 'none' : 'flex'};">
                        <span>🏥</span>
                        <span>Activez le toggle ci-dessus pour calculer les besoins en maladie grave de ${enfantName}</span>
                    </div>
                </div>
            `;
            contentContainer.appendChild(content);
            
            // Calculer si actif
            if (isActive) {
                setTimeout(() => calculateMGEnfant(index), 100);
            }
        });

        // Formater les inputs monétaires dynamiques des enfants
        FINOX.setupAllMoneyInputs(contentContainer);
    }
    
    window.saveAndNext = async function() {
        const result = await window.saveModuleData();
        if (result.success) {
            FINOX.showNotification('Besoins MG sauvegardés', 'success');
            FINOX_NAV.markAsSaved();
            if (typeof FINOX_NAV?.updateABFCheckmarks === 'function') FINOX_NAV.updateABFCheckmarks();
            FINOX_NAV.loadModule('abf-projets-epargne');
        } else {
            FINOX.showNotification('Erreur: ' + result.error, 'error');
        }
    };
    
    // ==========================================
    // 2. CHARGER DONNÉES CLIENT
    // ==========================================
    const client = await FINOX.loadClientData(true);
    if (!client) { console.error('❌ Aucun client'); return; }
    
    // Afficher conjoint
    if (client.has_conjoint) {
        document.querySelector('.conjoint-tab').classList.add('visible');
    }
    
    // Noms
    document.getElementById('maladieTabClientName').textContent = client.first_name || 'Client';
    document.getElementById('maladieTabConjointName').textContent = client.conjoint_first_name || 'Conjoint';
    
    // Revenus nets (70% du brut)
    revenuNetClient = Math.round((client.revenu_emploi || 0) * 0.7);
    revenuNetConjoint = Math.round((client.revenu_emploi_conjoint || 0) * 0.7);
    document.getElementById('revenuNetClientMG').value = revenuNetClient;
    document.getElementById('revenuNetConjointMG').value = revenuNetConjoint;
    
    // Charger enfants depuis abf_enfants
    try {
        const { data: enfants } = await FINOX.supabase
            .from('abf_enfants')
            .select('id, prenom, date_naissance, protection_mg_active, mg_niveau')
            .eq('client_id', FINOX.CLIENT_ID)
            .order('ordre', { ascending: true });
        
        if (enfants && enfants.length > 0) {
            enfantsData = enfants;
            console.log('👶 Enfants chargés:', enfantsData.length, enfantsData);
        }
    } catch (err) { console.warn('Erreur chargement enfants:', err); }
    
    // Charger assurances MG en vigueur depuis abf_assurances
    try {
        const { data: assurances } = await FINOX.supabase
            .from('abf_assurances')
            .select('type, assure, montant_couverture, exclure_calcul')
            .eq('client_id', FINOX.CLIENT_ID);
        
        if (assurances) {
            const clientPrenom = client.first_name || 'Client';
            const conjointPrenom = client.conjoint_first_name || 'Conjoint';
            
            assurances.forEach(a => {
                if (a.exclure_calcul) return;
                if (a.type?.includes('Maladie Grave')) {
                    if (a.assure === clientPrenom || a.assure === 'client') {
                        mgVigueurClient += a.montant_couverture || 0;
                    } else if (a.assure === conjointPrenom || a.assure === 'conjoint') {
                        mgVigueurConjoint += a.montant_couverture || 0;
                    } else {
                        // C'est probablement un enfant
                        enfantsMGVigueur[a.assure] = (enfantsMGVigueur[a.assure] || 0) + (a.montant_couverture || 0);
                    }
                }
            });
        }
        
        document.getElementById('maladieGraveVigueurClient').value = mgVigueurClient;
        document.getElementById('maladieGraveVigueurConjoint').value = mgVigueurConjoint;
    } catch (err) { console.warn('Erreur assurances:', err); }
    
    // Charger valeurs sauvegardées depuis abf_data
    const abfData = client.abf_data || {};
    
    if (abfData.mg_niveau_client) {
        niveauClient = abfData.mg_niveau_client;
        const radio = document.querySelector(`input[name="niveau_mg_client"][value="${niveauClient}"]`);
        if (radio) radio.checked = true;
    }
    
    if (abfData.mg_niveau_conjoint) {
        niveauConjoint = abfData.mg_niveau_conjoint;
        const radio = document.querySelector(`input[name="niveau_mg_conjoint"][value="${niveauConjoint}"]`);
        if (radio) radio.checked = true;
    }
    
    // Formater les inputs monétaires
    FINOX.setupAllMoneyInputs();

    // Calculs et rendu
    calculateAllMG();
    renderEnfantsTabs();
    
    // ==========================================
    // 3. FONCTION DE SAUVEGARDE SQL
    // ==========================================
    window.saveModuleData = async function() {
        if (isSaving) return { success: true };
        isSaving = true;
        
        const currentAbfData = client.abf_data || {};
        
        // Récupérer le besoin sélectionné
        let besoinClient = 0;
        if (niveauClient === 'repit') besoinClient = FINOX.parseNumber(document.getElementById('besoinRepitClient').textContent);
        else if (niveauClient === 'tranquillite') besoinClient = FINOX.parseNumber(document.getElementById('besoinTranquilliteClient').textContent);
        else besoinClient = FINOX.parseNumber(document.getElementById('besoinConfortClient').textContent);
        
        let besoinConjoint = 0;
        if (niveauConjoint === 'repit') besoinConjoint = FINOX.parseNumber(document.getElementById('besoinRepitConjoint').textContent);
        else if (niveauConjoint === 'tranquillite') besoinConjoint = FINOX.parseNumber(document.getElementById('besoinTranquilliteConjoint').textContent);
        else besoinConjoint = FINOX.parseNumber(document.getElementById('besoinConfortConjoint').textContent);
        
        const abfUpdate = {
            ...currentAbfData,
            mg_niveau_client: niveauClient,
            mg_niveau_conjoint: niveauConjoint,
            mg_besoin_client: besoinClient,
            mg_besoin_conjoint: besoinConjoint
        };
        
        try {
            // Sauvegarder abf_data dans clients
            const { error } = await FINOX.supabase
                .from('clients')
                .update({ abf_data: abfUpdate, updated_at: new Date().toISOString() })
                .eq('id', FINOX.CLIENT_ID);
            
            if (error) throw error;
            
            // Sauvegarder les données des enfants dans abf_enfants
            for (let i = 0; i < enfantsData.length; i++) {
                const enfant = enfantsData[i];
                if (enfant && enfant.id) {
                    const toggle = document.getElementById(`protectionMGEnfant${i}Toggle`);
                    const protectionActive = toggle ? toggle.classList.contains('active') : false;
                    const niveau = document.querySelector(`input[name="niveau_mg_enfant${i}"]:checked`)?.value || 'tranquillite';
                    
                    // Calculer le besoin MG de l'enfant
                    let besoinMGEnfant = 0;
                    if (protectionActive) {
                        if (niveau === 'repit') besoinMGEnfant = FINOX.parseNumber(document.getElementById(`besoinRepitEnfant${i}`)?.textContent);
                        else if (niveau === 'tranquillite') besoinMGEnfant = FINOX.parseNumber(document.getElementById(`besoinTranquilliteEnfant${i}`)?.textContent);
                        else besoinMGEnfant = FINOX.parseNumber(document.getElementById(`besoinConfortEnfant${i}`)?.textContent);
                    }
                    
                    const { error: enfantError } = await FINOX.supabase
                        .from('abf_enfants')
                        .update({
                            protection_mg_active: protectionActive,
                            mg_niveau: niveau,
                            mg_besoin_calcule: besoinMGEnfant
                        })
                        .eq('id', enfant.id);
                    
                    if (enfantError) console.warn('Erreur sauvegarde enfant MG:', enfantError);
                }
            }
            
            FINOX.updateClientDataCache({ abf_data: abfUpdate });
            await FINOX.loadClientData(true);
            
            isSaving = false;
            return { success: true };
        } catch (err) {
            console.error('Erreur sauvegarde:', err);
            isSaving = false;
            return { success: false, error: err.message };
        }
    };
    
    console.log('✅ Module ABF Besoins MG chargé');
})();
</script>
