<script>
(async function() {
    console.log('✅ Module Conformité Recommandations v4.0 - Init');
    
    // ==========================================
    // VARIABLES GLOBALES
    // ==========================================
    let isSaving = false;
    let clientName = 'Client';
    let conjointName = 'Conjoint';
    let hasConjoint = false;
    let enfantsData = [];
    let client = null;
    let abfData = {};
    
    // Besoins calculés (stockés pour affichage et texte conformité)
    const besoinsCalcules = {
        client: { vie: 0, maladie: 0, invalidite: 0, pret: 0, epargneMensuel: 0, epargneTransfert: 0 },
        conjoint: { vie: 0, maladie: 0, invalidite: 0, pret: 0, epargneMensuel: 0, epargneTransfert: 0 }
    };
    
    // Types de protections
    const TYPES_ADULTE = ['vie', 'maladie', 'invalidite', 'pret'];
    const TYPES_ENFANT = ['vie', 'maladie'];
    
    // Compagnies d'assurance
    const COMPAGNIES = [
        'Assomption Vie', 'Beneva', 'BMO', 'Canada Vie', 'Chevaliers de Colomb', 'Combined', 'CPP',
        'Desjardins', 'Emma', 'Empire Vie', 'Équitable', 'Foresters', 'Humania',
        'iA Groupe Financier', 'Ivari', 'Manuvie', 'Primerica', 'RBC', 'Securian',
        'Sun Life', 'UV Assurance', 'Autre'
    ];
    
    // Options "À faire"
    const OPTIONS_DELAI = [
        { value: 'prochaine_rencontre', label: 'Lors de la prochaine rencontre' },
        { value: 'quelques_mois', label: 'Dans quelques mois' },
        { value: 'budget_permet', label: 'Quand le budget me le permettra' }
    ];
    
    // ==========================================
    // UTILITAIRES
    // ==========================================
    function capitalize(str) {
        if (!str) return '';
        return str.charAt(0).toUpperCase() + str.slice(1);
    }
    
    function formatCurrency(num) {
        if (num === null || num === undefined || isNaN(num)) return '$0';
        return Math.round(num).toLocaleString('fr-CA', { style: 'currency', currency: 'CAD', minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }
    
    // Fonction sécurisée pour obtenir un nombre depuis abf_data
    // Gère les cas où la valeur est un nombre ou une string formatée
    function getNumericValue(value) {
        if (value === null || value === undefined) return 0;
        if (typeof value === 'number') return value;
        return FINOX.parseNumber(value);
    }
    
    // Fonction pour valider/corriger les valeurs d'invalidité aberrantes
    // Si le besoin mensuel est > 50000$/mois, c'est probablement une erreur de parsing (virgule)
    function validateInvaliditeValue(value, revenuAnnuel) {
        if (value > 50000) {
            // Valeur aberrante - probablement 510417 au lieu de 5104.17
            // Essayer de corriger en divisant par 100
            const corrected = value / 100;
            // Vérifier si ça a du sens (< 70% du revenu mensuel)
            const revenuMensuel = (revenuAnnuel || 100000) / 12;
            if (corrected < revenuMensuel * 0.8) {
                console.warn('⚠️ Valeur invalidité corrigée:', value, '->', corrected);
                return corrected;
            }
        }
        return value;
    }
    
    // ==========================================
    // GÉNÉRATION HTML DYNAMIQUE
    // ==========================================
    function generateColumnHTML(type, person, isEnfant = false) {
        const typeCap = capitalize(type);
        const personCap = capitalize(person);
        const prefix = `${typeCap}${personCap}`;
        
        const icons = { vie: '🛡️', maladie: '🏥', invalidite: '🩼', pret: '🏦', epargne: '💰' };
        const titles = { vie: 'Assurance Vie', maladie: 'Maladie Grave', invalidite: 'Invalidité', pret: 'Ass. Prêt', epargne: 'Épargne' };
        
        const isEpargne = type === 'epargne';
        const valueId = `summary${typeCap}${personCap}`;
        const suffix = (type === 'invalidite' || type === 'pret') ? '/mois' : '';
        
        // Raisons selon le type
        let raisonsHTML = '';
        if (isEpargne) {
            raisonsHTML = `
                <option value="">Sélectionner...</option>
                <option value="pas_interesse">Pas intéressé</option>
                <option value="montant_different">Montant différent</option>
            `;
        } else {
            raisonsHTML = `
                <option value="">Sélectionner...</option>
                <option value="pas_interesse">Pas intéressé</option>
                <option value="montant_superieur">Montant supérieur</option>
                <option value="montant_inferieur">Montant inférieur</option>
            `;
        }
        
        const compagniesOptions = COMPAGNIES.map(c => `<option value="${c}">${c}</option>`).join('');
        const delaisOptions = OPTIONS_DELAI.map(o => `<option value="${o.value}">${o.label}</option>`).join('');
        
        // Subvalue pour épargne
        const subvalueHTML = isEpargne ? `<div class="conformite-col-subvalue" id="summaryEpargneTransfert${personCap}"></div>` : '';

        // Champs montant
        let montantFieldsHTML = '';
        if (isEpargne) {
            montantFieldsHTML = `
                <div class="conformite-col-field hidden" id="montantEpargneMensuel${personCap}Div">
                    <label>Mensuel choisi ($)</label>
                    <input type="text" class="money-input" id="montantEpargneMensuel${personCap}" oninput="updateConformiteText('${type}', '${person}')">
                </div>
            `;
        } else {
            montantFieldsHTML = `
                <div class="conformite-col-field hidden" id="montant${prefix}Div">
                    <label>Montant choisi${suffix ? ' ($/mois)' : ' ($)'}</label>
                    <input type="text" class="money-input" id="montant${prefix}" oninput="updateConformiteText('${type}', '${person}')">
                </div>
            `;
        }
        
        return `
            <div class="conformite-column ${type}" id="col${prefix}">
                <div class="conformite-col-header">
                    <div class="conformite-col-icon">${icons[type]}</div>
                    <div class="conformite-col-title">${titles[type]}</div>
                    <div class="conformite-col-value" id="${valueId}">$0${suffix}</div>
                    ${subvalueHTML}
                </div>
                <div class="conformite-col-body">
                    <div class="conformite-col-field">
                        <label>Décision</label>
                        <select id="reco${prefix}" onchange="handleDecisionChange('${type}', '${person}')">
                            <option value="">Sélectionner...</option>
                            <option value="J'accepte">✅ J'accepte</option>
                            <option value="Je refuse">❌ Je refuse</option>
                            <option value="À faire">⏳ À faire</option>
                            <option value="N/A">➖ N/A</option>
                        </select>
                    </div>
                    <div class="conformite-col-field hidden" id="compagnie${prefix}Div">
                        <label>Compagnie</label>
                        <select id="compagnie${prefix}" onchange="markUnsaved();if(this.value==='Autre'){document.getElementById('compagnieAutre${prefix}').style.display='block'}else{document.getElementById('compagnieAutre${prefix}').style.display='none'}">
                            <option value="">Sélectionner...</option>
                            ${compagniesOptions}
                        </select>
                        <input type="text" id="compagnieAutre${prefix}" placeholder="Nom de la compagnie..." style="display:none;margin-top:6px;" onchange="markUnsaved()">
                    </div>
                    <div class="conformite-col-field hidden" id="delai${prefix}Div">
                        <label>Quand?</label>
                        <select id="delai${prefix}" onchange="markUnsaved()">
                            <option value="">Sélectionner...</option>
                            ${delaisOptions}
                        </select>
                    </div>
                    <div class="conformite-col-field hidden" id="raison${prefix}Div">
                        <label>Raison</label>
                        <select id="raison${prefix}" onchange="handleRaisonChange('${type}', '${person}')">
                            ${raisonsHTML}
                        </select>
                    </div>
                    ${montantFieldsHTML}
                    <div class="conformite-col-text hidden" id="conformite${prefix}"></div>
                    <div class="reco-objectifs-section">
                        <div class="reco-objectifs-toggle" onclick="toggleRecoObjectifs('${prefix}')">
                            🎯 Objectifs liés <span id="objCount${prefix}">0</span> ▾
                        </div>
                        <div class="reco-objectifs-pills" id="objPills${prefix}">
                            ${getObjectifPillsHTML(type, prefix)}
                        </div>

    function renderAllTabs() {
        const tabsContainer = document.getElementById('conformiteTabs');
        const contentContainer = document.getElementById('conformiteTabsContent');
        
        // Reset tabs enfants
        tabsContainer.querySelectorAll('.enfant-tab').forEach(tab => tab.remove());
        
        // Ajouter onglets enfants si besoin
        enfantsData.forEach((enfant, index) => {

        let contentHTML = '';
        contentHTML += generatePersonContent('client', TYPES_ADULTE);

            if (enfant.besoin_vie > 0 || enfant.besoin_mg > 0) {
                contentHTML += generatePersonContent(`enfant${index}`, TYPES_ENFANT, true);

    window.handleDecisionChange = function(type, person) {
        const prefix = `${capitalize(type)}${capitalize(person)}`;
        const select = document.getElementById(`reco${prefix}`);
        if (!select) return;
        
        const decision = select.value;
        const compagnieDiv = document.getElementById(`compagnie${prefix}Div`);
        const delaiDiv = document.getElementById(`delai${prefix}Div`);
        const raisonDiv = document.getElementById(`raison${prefix}Div`);
        const conformiteDiv = document.getElementById(`conformite${prefix}`);
        const column = document.getElementById(`col${prefix}`);
        
        // Update column status
        if (column) {
            column.classList.remove('status-accepte', 'status-refuse', 'status-afaire');
            if (decision === "J'accepte") column.classList.add('status-accepte');
            else if (decision === 'Je refuse') column.classList.add('status-refuse');
            else if (decision === 'À faire') column.classList.add('status-afaire');
        }
        
        // Reset tous les champs conditionnels
        [compagnieDiv, delaiDiv, raisonDiv, conformiteDiv].forEach(el => el?.classList.add('hidden'));
        
        // Reset champs montant
        if (type === 'epargne') {
            document.getElementById(`montantEpargneMensuel${capitalize(person)}Div`)?.classList.add('hidden');
        } else {
            document.getElementById(`montant${prefix}Div`)?.classList.add('hidden');
        }

        // Afficher selon décision
        if (decision === "J'accepte") {
            compagnieDiv?.classList.remove('hidden');
            // Montant retenu — permet de documenter le montant réel vs besoin calculé
            if (type === 'epargne') {
                const mensuelDiv = document.getElementById(`montantEpargneMensuel${capitalize(person)}Div`);
                mensuelDiv?.classList.remove('hidden');
                const mLabel = mensuelDiv?.querySelector('label');
                if (mLabel) mLabel.textContent = 'Mensuel retenu ($/mois)';
            } else {
                const montantDiv = document.getElementById(`montant${prefix}Div`);
                montantDiv?.classList.remove('hidden');
                const montantLabel = montantDiv?.querySelector('label');
                if (montantLabel) {
                    const suffix = (type === 'invalidite' || type === 'pret') ? ' ($/mois)' : ' ($)';
                    montantLabel.textContent = 'Montant retenu' + suffix;
                }
            }
            updateConformiteText(type, person);
        } else if (decision === 'Je refuse') {
            raisonDiv?.classList.remove('hidden');
        } else if (decision === 'À faire') {
            delaiDiv?.classList.remove('hidden');
        }

        // Show "create opportunity" option for À faire
        let afaireOppDiv = document.getElementById(`afaireOpp${prefix}`);
        if (!afaireOppDiv && decision === 'À faire') {
            // Create it dynamically
            const colBody = document.querySelector(`#col${prefix} .conformite-col-body`);
            if (colBody) {
                const div = document.createElement('div');
                div.className = 'reco-afaire-opp show';
                div.id = `afaireOpp${prefix}`;
                div.innerHTML = `<label>📅 Créer une opportunité</label>
                    <div class="reco-afaire-opp-row">
                        <input type="date" id="afaireOppDate${prefix}" max="2099-12-31">
                        <button class="reco-afaire-opp-btn" onclick="createInsuranceOpportunity('${type}','${person}')">🎯 Créer</button>
                    </div>`;
                colBody.appendChild(div);
            }
        } else if (afaireOppDiv) {
            afaireOppDiv.classList.toggle('show', decision === 'À faire');
        }

        window.markUnsaved();
    };
    
    window.handleRaisonChange = function(type, person) {

        const raison = document.getElementById(`raison${prefix}`)?.value || '';
        const compagnieDiv = document.getElementById(`compagnie${prefix}Div`);
        const conformiteDiv = document.getElementById(`conformite${prefix}`);
        
        if (type === 'epargne') {
            const mensuelDiv = document.getElementById(`montantEpargneMensuel${capitalize(person)}Div`);

            if (raison === 'montant_different') {
                compagnieDiv?.classList.remove('hidden');
                mensuelDiv?.classList.remove('hidden');
                conformiteDiv?.classList.add('hidden');
                const mLabel = mensuelDiv?.querySelector('label');
                if (mLabel) mLabel.textContent = 'Mensuel choisi ($/mois)';
            } else if (raison === 'pas_interesse') {
                compagnieDiv?.classList.add('hidden');
                mensuelDiv?.classList.add('hidden');
                updateConformiteText(type, person);
            } else {
                compagnieDiv?.classList.add('hidden');
                mensuelDiv?.classList.add('hidden');
                conformiteDiv?.classList.add('hidden');
            }
        } else {
            const montantDiv = document.getElementById(`montant${prefix}Div`);
            
            if (raison === 'montant_superieur' || raison === 'montant_inferieur') {
                compagnieDiv?.classList.remove('hidden');
                montantDiv?.classList.remove('hidden');
                conformiteDiv?.classList.add('hidden');
                // Label "choisi" pour le contexte de refus
                const montantLabel = montantDiv?.querySelector('label');
                if (montantLabel) {
                    const suffix = (type === 'invalidite' || type === 'pret') ? ' ($/mois)' : ' ($)';
                    montantLabel.textContent = 'Montant choisi' + suffix;
                }
            } else if (raison === 'pas_interesse') {
                compagnieDiv?.classList.add('hidden');
                montantDiv?.classList.add('hidden');
                updateConformiteText(type, person);
            } else {
                compagnieDiv?.classList.add('hidden');
                montantDiv?.classList.add('hidden');
                conformiteDiv?.classList.add('hidden');
            }
        }
        window.markUnsaved();
    };
    
    window.updateConformiteText = function(type, person) {
        const prefix = `${capitalize(type)}${capitalize(person)}`;
        const personCap = capitalize(person);
        const raison = document.getElementById(`raison${prefix}`)?.value || '';
        const conformiteDiv = document.getElementById(`conformite${prefix}`);
        
        if (!conformiteDiv) return;
        
        // Obtenir le prénom
        let prenom = '';
        if (person === 'client') prenom = clientName;
        else if (person === 'conjoint') prenom = conjointName;
        else if (person.startsWith('enfant')) {
            const idx = parseInt(person.replace('enfant', ''));
            prenom = enfantsData[idx]?.prenom || 'Enfant';
        }
        
        // Obtenir le besoin original depuis les valeurs stockées
        let besoinOriginal = '';
        let besoinNum = 0;
        const personKey = person.startsWith('enfant') ? person : person;
        
        if (type === 'vie') {
            besoinNum = besoinsCalcules[personKey]?.vie || 0;
            besoinOriginal = formatCurrency(besoinNum);
        } else if (type === 'maladie') {
            besoinNum = besoinsCalcules[personKey]?.maladie || 0;
            besoinOriginal = formatCurrency(besoinNum);
        } else if (type === 'invalidite') {
            besoinNum = besoinsCalcules[personKey]?.invalidite || 0;
            besoinOriginal = formatCurrency(besoinNum) + '/mois';
        } else if (type === 'pret') {
            besoinNum = besoinsCalcules[personKey]?.pret || 0;
            besoinOriginal = formatCurrency(besoinNum) + '/mois';
        } else if (type === 'epargne') {
            besoinNum = besoinsCalcules[personKey]?.epargneMensuel || 0;
            besoinOriginal = formatCurrency(besoinNum) + '/mois';
        }
        
        const typeLabels = {
            vie: "assurance vie",
            maladie: "assurance maladie grave",
            invalidite: "assurance invalidité",
            pret: "assurance prêt",
            epargne: "recommandation d'épargne"
        };
        const typeLabel = typeLabels[type] || type;
        
        // Décision courante + seuil d'écart acceptation (10%)
        const decision = document.getElementById(`reco${prefix}`)?.value || '';
        const SEUIL_ECART = 0.10;
        let text = '';
        let isWarning = false;

        // ── J'ACCEPTE — texte de conformité avec montant retenu + validation écart ──
        if (decision === "J'accepte") {
            if (type === 'epargne') {
                const mensuelInput = document.getElementById(`montantEpargneMensuel${personCap}`);
                const mensuelVal = mensuelInput?.value ? FINOX.parseNumber(mensuelInput.value) : null;
                const besoinMensuel = besoinsCalcules[personKey]?.epargneMensuel || 0;

                if (mensuelVal && mensuelVal > 0) {
                    if (besoinMensuel > 0) {
                        const ecartM = Math.abs(mensuelVal - besoinMensuel) / besoinMensuel;
                        if (ecartM > SEUIL_ECART) {
                            isWarning = true;
                            text = `⚠️ <strong>Écart trop important (${Math.round(ecartM * 100)}%)</strong><br>Mensuel retenu: ${formatCurrency(mensuelVal)}/mois vs besoin ${formatCurrency(besoinMensuel)}/mois<br><br>L'écart dépasse le seuil de 10% pour « J'accepte ». Veuillez sélectionner <strong>« Je refuse »</strong> → <strong>« Montant différent »</strong> pour documenter cet écart.`;
                        } else {
                            text = `<strong>Déclaration de ${prenom}:</strong> Mon conseiller m'a présenté une analyse de besoins financiers avec une recommandation d'épargne de <strong>${besoinOriginal}</strong>. J'accepte cette recommandation avec un prélèvement mensuel de <strong>${formatCurrency(mensuelVal)}/mois</strong>.`;
                        }
                    } else {
                        text = `<strong>Déclaration de ${prenom}:</strong> Mon conseiller m'a présenté une analyse de besoins financiers avec une recommandation d'épargne. J'accepte cette recommandation avec un prélèvement mensuel de <strong>${formatCurrency(mensuelVal)}/mois</strong>.`;
                    }
                } else if (besoinMensuel > 0) {
                    text = `<strong>Déclaration de ${prenom}:</strong> J'accepte la recommandation d'épargne de mon conseiller: <strong>${besoinOriginal}</strong>.`;
                }
            } else {
                const montantInput = document.getElementById(`montant${prefix}`);
                const montantVal = montantInput?.value ? FINOX.parseNumber(montantInput.value) : null;
                const suffix = (type === 'invalidite' || type === 'pret') ? '/mois' : '';

                if (montantVal && montantVal > 0 && besoinNum > 0) {
                    const ecart = Math.abs(montantVal - besoinNum) / besoinNum;

                    if (ecart > SEUIL_ECART) {
                        // Écart > 10% — bloquer et diriger vers "Je refuse"
                        isWarning = true;
                        const direction = montantVal > besoinNum ? 'supérieur' : 'inférieur';
                        const montantStr = formatCurrency(montantVal) + suffix;
                        const ecartPct = Math.round(ecart * 100);
                        text = `⚠️ <strong>Écart trop important (${ecartPct}%)</strong><br>Montant retenu: <strong>${montantStr}</strong> vs besoin calculé: <strong>${besoinOriginal}</strong><br><br>L'écart dépasse le seuil de 10% pour « J'accepte ». Veuillez sélectionner <strong>« Je refuse »</strong> → <strong>« Montant ${direction} »</strong> pour documenter cet écart.`;
                    } else {
                        const montantStr = formatCurrency(montantVal) + suffix;
                        text = `<strong>Déclaration de ${prenom}:</strong> Mon conseiller m'a présenté une analyse de besoins financiers indiquant un besoin en ${typeLabel} de <strong>${besoinOriginal}</strong>. J'accepte cette recommandation avec un montant de couverture retenu de <strong>${montantStr}</strong>.`;
                    }
                } else if (besoinNum > 0) {
                    text = `<strong>Déclaration de ${prenom}:</strong> J'accepte la recommandation de mon conseiller pour une couverture en ${typeLabel} de <strong>${besoinOriginal}</strong>.`;
                }
            }
        }
        // ── JE REFUSE — textes existants ──
        else if (raison === 'pas_interesse') {
            text = `<strong>Déclaration de ${prenom}:</strong> Je reconnais que mon conseiller m'a présenté une analyse de besoins financiers indiquant un besoin en ${typeLabel} de <strong>${besoinOriginal}</strong>. Après avoir pris connaissance de cette recommandation, je choisis de ne pas donner suite. Je comprends les implications de cette décision et j'assume pleinement les conséquences de ce choix.`;
        } else if (raison === 'montant_superieur') {
            const montantInput = document.getElementById(`montant${prefix}`);
            const suffix = (type === 'invalidite' || type === 'pret') ? '/mois' : '';
            const montant = montantInput?.value ? formatCurrency(FINOX.parseNumber(montantInput.value)) + suffix : '[montant à préciser]';
            text = `<strong>Déclaration de ${prenom}:</strong> Je reconnais que mon conseiller m'a présenté une analyse de besoins financiers indiquant un besoin en ${typeLabel} de <strong>${besoinOriginal}</strong>. Après réflexion, je choisis de souscrire à une protection de <strong>${montant}</strong>, soit un montant supérieur à la recommandation.`;
        } else if (raison === 'montant_inferieur') {
            const montantInput = document.getElementById(`montant${prefix}`);
            const suffix = (type === 'invalidite' || type === 'pret') ? '/mois' : '';
            const montant = montantInput?.value ? formatCurrency(FINOX.parseNumber(montantInput.value)) + suffix : '[montant à préciser]';
            text = `<strong>Déclaration de ${prenom}:</strong> Je reconnais que mon conseiller m'a présenté une analyse de besoins financiers indiquant un besoin en ${typeLabel} de <strong>${besoinOriginal}</strong>. Après réflexion, je choisis de souscrire à une protection de <strong>${montant}</strong>, soit un montant inférieur à la recommandation. Je comprends que cette couverture partielle ne répond pas entièrement à mes besoins identifiés.`;
        } else if (raison === 'montant_different' && type === 'epargne') {
            const mensuelInput = document.getElementById(`montantEpargneMensuel${personCap}`);
            const mensuel = mensuelInput?.value ? formatCurrency(FINOX.parseNumber(mensuelInput.value)) + '/mois' : '[à préciser]';
            text = `<strong>Déclaration de ${prenom}:</strong> Je reconnais que mon conseiller m'a présenté une analyse de besoins financiers avec une recommandation d'épargne de <strong>${besoinOriginal}</strong>. Après réflexion, je choisis d'épargner <strong>${mensuel}</strong> en prélèvement automatique.`;
        }
        
        if (text) {
            conformiteDiv.innerHTML = text;
            conformiteDiv.classList.remove('hidden');
            // Style warning (rouge) vs normal (or)
            if (isWarning) {
                conformiteDiv.style.background = 'rgba(239, 68, 68, 0.1)';
                conformiteDiv.style.borderColor = 'rgba(239, 68, 68, 0.4)';
                conformiteDiv.style.color = '#fca5a5';
            } else {
                conformiteDiv.style.background = '';
                conformiteDiv.style.borderColor = '';
                conformiteDiv.style.color = '';
            }
        } else {
            conformiteDiv.classList.add('hidden');
            conformiteDiv.style.background = '';
            conformiteDiv.style.borderColor = '';
            conformiteDiv.style.color = '';
        }
        window.markUnsaved();
    };

    let epargneItems = [];

    function renderEpargneTab() {
        const container = document.getElementById('recoEpargneBody');
        if (!container) return;

        // Load À faire items from abf_data
        const clientData = FINOX.getClientData();
        const afaire = clientData?.abf_data?.actifs_a_faire || [];

        // Build items: À faire from portrait + existing epargne needs
        epargneItems = [];

        // Add "à faire" items from Portrait Financier
        afaire.forEach((item, idx) => {
            epargneItems.push({
                id: item.id || 'af_' + idx,
                type: item.type,
                icon: item.icon || '📦',
                owner: item.owner || '',
                contribution: item.contribution || 0,
                notes: item.notes || '',
                source: 'portrait',
                source_label: 'Depuis Portrait Financier'
            });
        });

        // Empty state if no à faire items
        if (epargneItems.length === 0) {
            container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#9ca3af;">
                <div style="font-size:3rem;margin-bottom:16px;">⏳</div>
                <div style="font-size:1.1rem;font-weight:600;color:#e5e7eb;margin-bottom:8px;">Aucun compte à prévoir</div>
                <div style="font-size:0.9rem;max-width:400px;margin:0 auto;">Ajoutez des comptes dans <strong>Portrait Financier → À faire / À prévoir</strong> pour qu'ils apparaissent ici comme recommandations d'épargne.</div>
            </div>`;
            return;
        }

        // Restore saved decisions
        const savedEpargne = abfData.recommandations_epargne || {};

        let html = '<div class="reco-epargne-grid">';
        epargneItems.forEach(item => {
            const saved = savedEpargne[item.id] || {};
            const decision = saved.decision || '';
            const statusClass = decision === "J'accepte" ? 'status-accepte' : decision === 'Je refuse' ? 'status-refuse' : decision === 'À faire' ? 'status-afaire' : '';

            const contribStr = item.contribution > 0 ? formatCurrency(item.contribution) + '/mois' : '';
            const sourceBadge = item.source === 'portrait' ? `<span class="reco-epargne-source-badge">⏳ ${item.source_label}</span>` : '';

            // Objectifs pills for epargne
            const objPills = OBJECTIFS_EPARGNE.map(o =>

    window.handleEpargneDecision = function(itemId) {
        const decision = document.getElementById('epDecision_' + itemId)?.value || '';
        const card = document.getElementById('epCard_' + itemId);
        const compagnieDiv = document.getElementById('epCompagnie_' + itemId + '_div');
        const montantDiv = document.getElementById('epMontant_' + itemId + '_div');
        const afaireDiv = document.getElementById('epAfaire_' + itemId);

        if (card) {
            card.classList.remove('status-accepte', 'status-refuse', 'status-afaire');
            if (decision === "J'accepte") card.classList.add('status-accepte');
            else if (decision === 'Je refuse') card.classList.add('status-refuse');
            else if (decision === 'À faire') card.classList.add('status-afaire');
        }

        compagnieDiv?.classList.toggle('hidden', decision !== "J'accepte");
        montantDiv?.classList.toggle('hidden', decision !== "J'accepte");
        afaireDiv?.classList.toggle('show', decision === 'À faire');
        markUnsaved();
    };

    window.toggleEpargneObjPill = function(el) {
        el.classList.toggle('selected');
        markUnsaved();
    };

    window.toggleEpargneObjAutre = function(el) {
        el.classList.toggle('selected');
        const itemId = el.dataset.epid;
        const input = document.getElementById('epObjAutre_' + itemId);
        if (input) input.classList.toggle('show', el.classList.contains('selected'));
        markUnsaved();
    };

    window.createEpargneOpportunity = async function(itemId) {
        const item = epargneItems.find(i => i.id === itemId);
        if (!item) return;

        const dateInput = document.getElementById('epAfaireDate_' + itemId);
        const targetDate = dateInput?.value || null;

        const user = FINOX.getCurrentUser();
        if (!user) return;

        try {
            const { data: profile } = await FINOX.supabase
                .from('profiles').select('organization_id').eq('id', user.id).single();
            if (!profile) return;

            const { error } = await FINOX.supabase
                .from('client_opportunities')
                .insert({
                    organization_id: profile.organization_id,
                    client_id: FINOX.CLIENT_ID,
                    conseiller_id: user.id,
                    category: 'epargne',
                    title: `${item.type} — ${item.owner || 'Client'}`,
                    description: item.notes || `Recommandation épargne: ${item.type}`,
                    target_date: targetDate,
                    stage: 'active',
                    priority: 'normal',
                    source: 'recommandation',
                    metadata: { source_type: 'recommandation_epargne', item_type: item.type, owner: item.owner }
                });

            if (error) throw error;

            // Transform UI to show success
            const container = document.getElementById('epAfaire_' + itemId);
            if (container) {
                const dateStr = targetDate ? new Date(targetDate).toLocaleDateString('fr-CA', { day: 'numeric', month: 'long', year: 'numeric' }) : '';

            FINOX.addTimelineEntry('opportunity', `🎯 Opportunité: ${item.type}`, `Depuis recommandation — ${item.owner}`);
        } catch (e) {
            console.error('Erreur:', e);
            FINOX.showNotification('Erreur: ' + e.message, 'error');
        }
    };

    function collectAllData() {
        const data = { client: {}, conjoint: {}, enfants: {} };
        
        ['client', 'conjoint'].forEach(person => {
            const personCap = capitalize(person);
            data[person] = {};
            
            TYPES_ADULTE.forEach(type => {
                const prefix = `${capitalize(type)}${personCap}`;
                data[person][type] = {
                    decision: document.getElementById(`reco${prefix}`)?.value || '',
                    compagnie: document.getElementById(`compagnie${prefix}`)?.value || '',
                    delai: document.getElementById(`delai${prefix}`)?.value || '',
                    raison: document.getElementById(`raison${prefix}`)?.value || ''
                };
                
                if (type === 'epargne') {
                    data[person][type].montant_mensuel = FINOX.parseNumber(document.getElementById(`montantEpargneMensuel${personCap}`)?.value) || null;
                } else {
                    data[person][type].montant = FINOX.parseNumber(document.getElementById(`montant${prefix}`)?.value) || null;
                }
            });
        });
        
        enfantsData.forEach((enfant, index) => {
            if (enfant.besoin_vie > 0 || enfant.besoin_mg > 0) {
                const person = `enfant${index}`;
                const personCap = capitalize(person);
                data.enfants[person] = {};
                
                TYPES_ENFANT.forEach(type => {
                    const prefix = `${capitalize(type)}${personCap}`;
                    data.enfants[person][type] = {
                        decision: document.getElementById(`reco${prefix}`)?.value || '',
                        compagnie: document.getElementById(`compagnie${prefix}`)?.value || '',
                        delai: document.getElementById(`delai${prefix}`)?.value || '',
                        raison: document.getElementById(`raison${prefix}`)?.value || '',
                        montant: FINOX.parseNumber(document.getElementById(`montant${prefix}`)?.value) || null
                    };
                });
            }
        });

        // Collect per-product objectifs
        data.objectifs_par_produit = {};
        ['client', 'conjoint'].forEach(person => {
            const personCap = capitalize(person);
            TYPES_ADULTE.forEach(type => {
                const prefix = `${capitalize(type)}${personCap}`;
                const pills = document.querySelectorAll(`#objPills${prefix} .reco-obj-pill.selected`);
                const selected = {};
                pills.forEach(p => { selected[p.dataset.key] = true; });
                const autreInput = document.getElementById('objAutre' + prefix);
                if (autreInput?.value) selected.autre_text = autreInput.value;
                if (Object.keys(selected).length > 0) {
                    data.objectifs_par_produit[prefix] = selected;
                }
            });
        });

        // Collect epargne decisions
        data.epargne = {};
        epargneItems.forEach(item => {
            const decision = document.getElementById('epDecision_' + item.id)?.value || '';
            if (!decision) return;
            const entry = { decision };
            if (decision === "J'accepte") {
                entry.compagnie = document.getElementById('epCompagnie_' + item.id)?.value || '';
                entry.montant_mensuel = FINOX.parseNumber(document.getElementById('epMontant_' + item.id)?.value) || null;
            }
            if (decision === 'À faire') {
                entry.opp_date = document.getElementById('epAfaireDate_' + item.id)?.value || null;
            }
            // Collect objectifs for this epargne item
            const objPills = document.querySelectorAll(`.reco-obj-pill[data-epid="${item.id}"].selected`);
            const objSelected = {};
            objPills.forEach(p => { objSelected[p.dataset.key] = true; });
            const autreInput = document.getElementById('epObjAutre_' + item.id);
            if (autreInput?.value) objSelected.autre_text = autreInput.value;
            if (Object.keys(objSelected).length > 0) entry.objectifs = objSelected;
            data.epargne[item.id] = entry;
        });

        return data;
    }

    function restoreObjectifsParProduit(data) {
        if (!data) return;
        Object.keys(data).forEach(prefix => {
            const selected = data[prefix];
            Object.keys(selected).forEach(key => {
                if (key === 'autre_text') {
                    const input = document.getElementById('objAutre' + prefix);
                    if (input) { input.value = selected.autre_text; input.classList.add('show'); }
                } else {
                    const pill = document.querySelector(`#objPills${prefix} .reco-obj-pill[data-key="${key}"]`);
                    if (pill) pill.classList.add('selected');
                }
            });
            updateObjCount(prefix);
        });
    }

    function restoreAllData(data) {
        if (!data) return;

        ['client', 'conjoint'].forEach(person => {
            if (!data[person]) return;
            const personCap = capitalize(person);

            TYPES_ADULTE.forEach(type => {
                const d = data[person][type];
                if (!d) return;
                const prefix = `${capitalize(type)}${personCap}`;
                
                const decisionEl = document.getElementById(`reco${prefix}`);
                if (decisionEl && d.decision) {
                    decisionEl.value = d.decision;
                    handleDecisionChange(type, person);
                }
                
                if (d.compagnie) {
                    const el = document.getElementById(`compagnie${prefix}`);
                    if (el) el.value = d.compagnie;
                }
                
                if (d.delai) {
                    const el = document.getElementById(`delai${prefix}`);
                    if (el) el.value = d.delai;
                }
                
                if (d.raison) {
                    const raisonEl = document.getElementById(`raison${prefix}`);
                    if (raisonEl) {
                        raisonEl.value = d.raison;
                        handleRaisonChange(type, person);
                    }
                }
                
                if (type === 'epargne') {
                    if (d.montant_mensuel) {
                        const el = document.getElementById(`montantEpargneMensuel${personCap}`);
                        if (el) el.value = d.montant_mensuel;
                    }
                } else if (d.montant) {
                    const el = document.getElementById(`montant${prefix}`);
                    if (el) el.value = d.montant;
                }

                if (d.raison || d.decision === "J'accepte") updateConformiteText(type, person);
            });
        });

        if (data.enfants) {
            Object.keys(data.enfants).forEach(person => {
                const personData = data.enfants[person];
                const personCap = capitalize(person);
                
                TYPES_ENFANT.forEach(type => {
                    const d = personData[type];
                    if (!d) return;
                    const prefix = `${capitalize(type)}${personCap}`;
                    
                    const decisionEl = document.getElementById(`reco${prefix}`);
                    if (decisionEl && d.decision) {
                        decisionEl.value = d.decision;
                        handleDecisionChange(type, person);
                    }
                    
                    if (d.compagnie) {
                        const el = document.getElementById(`compagnie${prefix}`);
                        if (el) el.value = d.compagnie;
                    }
                    
                    if (d.delai) {
                        const el = document.getElementById(`delai${prefix}`);
                        if (el) el.value = d.delai;
                    }
                    
                    if (d.raison) {
                        const raisonEl = document.getElementById(`raison${prefix}`);
                        if (raisonEl) {
                            raisonEl.value = d.raison;
                            handleRaisonChange(type, person);
                        }
                    }
                    
                    if (d.montant) {
                        const el = document.getElementById(`montant${prefix}`);
                        if (el) el.value = d.montant;
                    }

                    if (d.raison || d.decision === "J'accepte") updateConformiteText(type, person);
                });
            });
        }
    }

    async function loadAllBesoins() {
        console.log('📊 Chargement des besoins depuis abf_data...');
        
        // Revenus pour validation
        const revenuClient = client.revenu_emploi || 0;
        const revenuConjoint = client.revenu_emploi_conjoint || 0;
        
        // === ASSURANCE VIE ===
        // Stocké comme nombre dans vie_client.besoin_calcule
        besoinsCalcules.client.vie = getNumericValue(abfData.vie_client?.besoin_calcule);
        besoinsCalcules.conjoint.vie = getNumericValue(abfData.vie_conjoint?.besoin_calcule);
        
        // === MALADIE GRAVE ===
        // Stocké comme nombre dans mg_besoin_client
        besoinsCalcules.client.maladie = getNumericValue(abfData.mg_besoin_client);
        besoinsCalcules.conjoint.maladie = getNumericValue(abfData.mg_besoin_conjoint);
        
        // === INVALIDITÉ ===
        // Stocké comme nombre dans inv_client.besoin_calcule
        // Validation pour corriger les valeurs aberrantes (bug de parsing virgule)
        let invClient = getNumericValue(abfData.inv_client?.besoin_calcule);
        let invConjoint = getNumericValue(abfData.inv_conjoint?.besoin_calcule);
        besoinsCalcules.client.invalidite = validateInvaliditeValue(invClient, revenuClient);
        besoinsCalcules.conjoint.invalidite = validateInvaliditeValue(invConjoint, revenuConjoint);
        
        // === ASSURANCE PRÊT + ÉPARGNE ===
        // Calculé depuis abf_actifs (prêts: paiement_mensuel, épargne: contributions)
        besoinsCalcules.client.epargneMensuel = 0;
        besoinsCalcules.conjoint.epargneMensuel = 0;
        try {
            const { data: actifs } = await FINOX.supabase
                .from('abf_actifs')
                .select('type, description, paiement_mensuel, proprietaire, projet_type, contribution_mensuelle, contribution_employeur')
                .eq('client_id', FINOX.CLIENT_ID);

            let pretClient = 0;
            let pretConjoint = 0;

            if (actifs && actifs.length > 0) {
                console.log('🏦 Actifs trouvés:', actifs.length);

                actifs.forEach(a => {
                    const prop = (a.proprietaire || '').toLowerCase();
                    const clientNameLower = clientName.toLowerCase();
                    const conjointNameLower = conjointName.toLowerCase();

                    // --- Prêts (paiement mensuel) ---
                    const paiement = a.paiement_mensuel || 0;
                    if (paiement > 0) {
                        if (prop === clientNameLower || prop === 'client' || prop === 'les deux') {
                            pretClient += paiement;
                        }
                        if (prop === conjointNameLower || prop === 'conjoint' || prop === 'les deux') {
                            pretConjoint += paiement;
                        }
                    }

                    // --- Épargne (contributions mensuelles, hors RRPD) ---
                    if (a.type === 'RRPD') return;
                    const contrib = (a.contribution_mensuelle || 0) + (a.contribution_employeur || 0);
                    if (contrib <= 0) return;

                    if (prop === clientNameLower || prop === 'client') {
                        besoinsCalcules.client.epargneMensuel += contrib;
                    } else if (prop === conjointNameLower || prop === 'conjoint') {
                        besoinsCalcules.conjoint.epargneMensuel += contrib;
                    } else if (prop === 'les deux') {
                        besoinsCalcules.client.epargneMensuel += contrib / 2;
                        besoinsCalcules.conjoint.epargneMensuel += contrib / 2;
                    }
                });
            }

            besoinsCalcules.client.pret = pretClient;
            besoinsCalcules.conjoint.pret = pretConjoint;
            console.log('🏦 Besoins prêt - Client:', pretClient, 'Conjoint:', pretConjoint);
            console.log('💰 Besoins épargne - Client:', besoinsCalcules.client.epargneMensuel, '/mois | Conjoint:', besoinsCalcules.conjoint.epargneMensuel, '/mois');

        } catch (err) {
            console.warn('Erreur chargement actifs:', err);
            besoinsCalcules.client.pret = 0;
            besoinsCalcules.conjoint.pret = 0;
            besoinsCalcules.client.epargneMensuel = 0;
            besoinsCalcules.conjoint.epargneMensuel = 0;
        }
        
        console.log('📊 Besoins calculés:', besoinsCalcules);
        
        // Mettre à jour l'affichage
        updateBesoinsDisplay();
    }

    // Afficher tab conjoint
    if (hasConjoint) {
        document.querySelector('.conjoint-tab').classList.add('visible');
    }
    
    // Noms dans les tabs
    document.getElementById('conformiteTabClientName').textContent = clientName;
    document.getElementById('conformiteTabConjointName').textContent = conjointName;
    
    // Charger enfants
    try {
        const { data: enfants } = await FINOX.supabase
            .from('abf_enfants')
            .select('id, prenom, date_naissance, protection_vie_active, protection_mg_active, frais_funerailles, heritage, mg_niveau, vie_besoin_calcule, mg_besoin_calcule')
            .eq('client_id', FINOX.CLIENT_ID)
            .order('ordre', { ascending: true });
        
        if (enfants && enfants.length > 0) {
            enfants.forEach(enfant => {
                // Utiliser besoins pré-calculés si disponibles
                enfant.besoin_vie = getNumericValue(enfant.vie_besoin_calcule);
                enfant.besoin_mg = getNumericValue(enfant.mg_besoin_calcule);
                
                // Fallback si pas encore calculé
                if (enfant.protection_vie_active && !enfant.besoin_vie) {
                    enfant.besoin_vie = (enfant.frais_funerailles || 5000) + (enfant.heritage || 0);
                }
                
                if (enfant.protection_mg_active && !enfant.besoin_mg) {
                    const revenuRef = Math.max(
                        (client.revenu_emploi || 0) * 0.7,
                        (client.revenu_emploi_conjoint || 0) * 0.7
                    );
                    const mensuel = revenuRef / 12;
                    const niveau = enfant.mg_niveau || 'tranquillite';
                    
                    if (niveau === 'repit') enfant.besoin_mg = mensuel * 6 + 10000;
                    else if (niveau === 'tranquillite') enfant.besoin_mg = mensuel * 12 + 25000;
                    else enfant.besoin_mg = mensuel * 24 + 40000;
                }
            });
            enfantsData = enfants;
            console.log('👶 Enfants conformité:', enfantsData);
        }
    } catch (err) { 
        console.warn('Erreur enfants:', err); 
    }
    
    // Rendre l'interface
    renderAllTabs();
    
    // Charger et afficher les besoins
    await loadAllBesoins();

    // Activer le formatage monétaire sur les inputs
    FINOX.setupAllMoneyInputs();

    // Restaurer données sauvegardées
    if (abfData.recommandations) {
        restoreAllData(abfData.recommandations);
        console.log('📊 Recommandations restaurées');
    }

    // Restore objectifs par produit from abf_data
    if (abfData.objectifs_par_produit) {
        restoreObjectifsParProduit(abfData.objectifs_par_produit);
    }
    
    // ==========================================
    // FONCTION DE SAUVEGARDE SQL
    // ==========================================
    window.saveModuleData = async function() {
        if (isSaving) return { success: true };
        isSaving = true;

        const currentAbfData = client?.abf_data || {};
        const recommandationsData = collectAllData();

        // ═══ GUARD: Ne pas écraser des recommandations existantes si aucune décision remplie ═══
        const hasAnyDecision = (() => {
            for (const person of ['client', 'conjoint']) {
                const pd = recommandationsData[person] || {};
                for (const type of Object.keys(pd)) {
                    if (pd[type]?.decision) return true;
                }
            }
            if (recommandationsData.enfants) {
                for (const key of Object.keys(recommandationsData.enfants)) {
                    const pd = recommandationsData.enfants[key] || {};
                    for (const type of Object.keys(pd)) {
                        if (pd[type]?.decision) return true;
                    }
                }
            }
            if (recommandationsData.epargne && Object.keys(recommandationsData.epargne).length > 0) {
                for (const key of Object.keys(recommandationsData.epargne)) {
                    if (recommandationsData.epargne[key]?.decision) return true;
                }
            }
            return false;
        })();

        // Si aucune décision et qu'il y a déjà des recos sauvegardées, ne pas écraser
        if (!hasAnyDecision && currentAbfData.recommandations) {
            console.log('⚠️ Aucune décision remplie — recommandations existantes conservées');
            isSaving = false;
            return { success: true };
        }

        console.log('💾 Sauvegarde recommandations...', recommandationsData);

        const abfUpdate = {
            ...currentAbfData,
            recommandations: recommandationsData,
            recommandations_epargne: recommandationsData.epargne || {},
            objectifs_par_produit: recommandationsData.objectifs_par_produit || {},
            recommandations_updated: new Date().toISOString()
        };
        
        try {
            const { error } = await FINOX.supabase
                .from('clients')
                .update({ abf_data: abfUpdate, updated_at: new Date().toISOString() })
                .eq('id', FINOX.CLIENT_ID);
            
            if (error) throw error;
            
            FINOX.updateClientDataCache({ abf_data: abfUpdate });
            console.log('✅ Recommandations sauvegardées');
            isSaving = false;
            return { success: true };
        } catch (err) {
            console.error('❌ Erreur sauvegarde:', err);
            isSaving = false;
            return { success: false, error: err.message };
        }
    };
    
    console.log('✅ Module Conformité Recommandations v4.0 chargé');
})();
</script>
