<script>
console.log('📥 Module Export & Signature v5.0 - Init');

const SIGNATURE_PAGE_URL = window.location.origin + '/modules/signature.html';
const RINGCENTRAL_WORKER = window.location.origin + '/ringcentral';

let clientData = null;
let lettresHistorique = [];
(async function init() {
    clientData = await FINOX.loadClientData(true);
    if (!clientData) return;
    lettresHistorique = clientData.abf_data?.lettres_historique || [];
    renderLettres();
    loadSignatures();
    // Hide retraite export section if not enabled
    if (!clientData.abf_data?.retraite_enabled) {
        const retGroup = document.getElementById('retraiteExportGroup');
        if (retGroup) retGroup.style.display = 'none';
    }
})();

window.saveModuleData = async function() {
    if (!clientData) return { success: true };
    const abfData = clientData.abf_data || {};

    try {
        const { error } = await FINOX.supabase
            .from('clients')
            .update({ abf_data: abfData, updated_at: new Date().toISOString() })
            .eq('id', FINOX.CLIENT_ID);
        if (error) throw error;
        FINOX.updateClientDataCache({ abf_data: abfData });
        return { success: true };
    } catch (err) {
        console.error('❌ Erreur sauvegarde export:', err);
        return { success: false, error: err.message };
    }
};

function renderLettres() {
    const container = document.getElementById('lettresCheckboxes');
    if (lettresHistorique.length === 0) {
        container.innerHTML = '<div class="no-lettres">Aucune lettre sauvegardée</div>';
        return;
    }
    container.innerHTML = lettresHistorique.map((l, i) => `
        <label class="lettre-checkbox">
            <input type="checkbox" data-lettre-id="${l.id}">
            <span class="checkbox-custom"></span>
            <span class="lettre-title">${i===0?'⭐ ':''}${l.titre || 'Lettre'}</span>
        </label>
    `).join('');
}

async function loadSignatures() {
    try {
        const { data, error } = await FINOX.supabase
            .from('signature_requests')
            .select('*')
            .eq('client_id', FINOX.CLIENT_ID)
            .order('created_at', { ascending: false })
            .limit(20);

        if (error) throw error;
        window.signaturesData = data || [];
    } catch (error) {
        console.error('Erreur chargement signatures:', error);
    }
}

function getStatusLabel(status) {
    const labels = { 'pending': '⏳ En attente', 'viewed': '👁️ Consulté', 'signed': '✅ Signé', 'expired': '⏰ Expiré', 'cancelled': '🚫 Annulé' };
    return labels[status] || status;
}

window.cancelSignatureRequest = async function(id) {
    if (!(await FINOX.confirm('Êtes-vous sûr de vouloir annuler cette demande de signature?\n\nCette action est irréversible.'))) return;

    try {
        // Supprimer de la base de données (pending ou viewed, pas signed)
        const { error, count } = await FINOX.supabase
            .from('signature_requests')
            .delete()
            .eq('id', id)
            .in('status', ['pending', 'viewed']);

        if (error) throw error;

        FINOX.showNotification('✅ Demande annulée', 'success');

        // Recharger la liste complète depuis la DB pour assurer la cohérence
        await loadSignatures();

    } catch (error) {
        console.error('Erreur suppression signature:', error);
        FINOX.showNotification('❌ Erreur: ' + error.message, 'error');
    }
};

window.sendForSignature = async function() {
    // Au moins un email/phone (client ou conjoint) requis
    if (!clientData.email && !clientData.phone && !(clientData.has_conjoint && (clientData.conjoint_email || clientData.conjoint_phone))) {
        FINOX.showNotification('❌ Aucune adresse courriel ou téléphone disponible!', 'error');
        return;
    }

    // Vérifier les destinataires possibles
    const clientPhone = (clientData.phone || '').replace(/\D/g, '');
    const conjointPhone = (clientData.conjoint_phone || '').replace(/\D/g, '');
    const clientAvailable = !!(clientData.email || clientData.phone);
    const hasConjoint = clientData.has_conjoint && (clientData.conjoint_email || clientData.conjoint_phone);

    // Valider les mots de passe (4 derniers chiffres du téléphone de chaque personne)
    const clientLastFour = clientPhone.slice(-4);
    const conjointLastFour = conjointPhone.slice(-4);

    if (clientAvailable && clientLastFour.length !== 4) {
        FINOX.showNotification('❌ Le client n\'a pas de numéro de téléphone valide (4 chiffres requis pour le mot de passe)', 'error');
        return;
    }
    if (hasConjoint && conjointLastFour.length !== 4) {
        FINOX.showNotification('❌ Le conjoint n\'a pas de numéro de téléphone valide (4 chiffres requis pour le mot de passe)', 'error');
        return;
    }

    // Si conjoint existe, afficher le modal de choix de destinataire
    let selectedRecipients;
    if (hasConjoint && clientAvailable) {
        selectedRecipients = await showRecipientChoiceModal(clientLastFour, conjointLastFour);
        if (!selectedRecipients) return; // Annulé
    } else if (hasConjoint) {
        selectedRecipients = ['conjoint'];
    } else {
        selectedRecipients = ['client'];
    }

    // Construire la liste de destinataires
    const recipients = [];
    if (selectedRecipients.includes('client')) {
        recipients.push({ type: 'client', name: `${clientData.first_name || ''} ${clientData.last_name || ''}`.trim() || 'Client', email: clientData.email, phone: clientData.phone, password: clientLastFour });
    }
    if (selectedRecipients.includes('conjoint')) {
        recipients.push({ type: 'conjoint', name: `${clientData.conjoint_first_name || ''} ${clientData.conjoint_last_name || ''}`.trim() || 'Conjoint', email: clientData.conjoint_email, phone: clientData.conjoint_phone, password: conjointLastFour });
    }

    try {
        FINOX.showNotification('⏳ Préparation...', 'success');

        const sections = getSelectedSections();
        sections.signatures = false;
        const data = await loadAllData(sections);
        const lettres = getSelectedLettres();
        const conseiller = getConseillerInfo();
        console.log('[Signature] Conseiller info:', conseiller);
        let documentHTML;
        try {
            documentHTML = generateSignatureDocumentHTML(data, sections, lettres, conseiller);
        } catch (genErr) {
            console.error('[Signature] Erreur génération HTML:', genErr);
            FINOX.showNotification('❌ Erreur génération du document: ' + genErr.message, 'error');
            return;
        }
        console.log('[Signature] Document HTML généré, taille:', documentHTML?.length);
        const expiresAt = new Date();
        expiresAt.setDate(expiresAt.getDate() + 7);

        // Generate SHA-256 hash of document for LCCJTI non-repudiation compliance
        const documentHash = await generateSHA256Hash(documentHTML);
        const { data: userData } = await FINOX.supabase.auth.getUser();

        // Fetch Google Review URL from conseiller profile
        let googleReviewUrl = null;
        if (userData?.user?.id) {
            const { data: prof } = await FINOX.supabase.from('profiles').select('google_review_url').eq('id', userData.user.id).single();
            googleReviewUrl = prof?.google_review_url || null;
        }

        // Créer une demande par destinataire avec mot de passe INDIVIDUEL
        const insertRows = recipients.map(r => ({
            client_id: FINOX.CLIENT_ID,
            conseiller_id: userData?.user?.id,
            token: generateToken(),
            password_hash: r.password,
            document_html: documentHTML,
            document_hash: documentHash,
            hash_algorithm: 'SHA-256',
            sections_included: sections,
            client_name: `${clientData.first_name} ${clientData.last_name}`,
            client_email: r.email || clientData.email,
            recipient_type: r.type,
            recipient_name: r.name,
            recipient_email: r.email || null,
            recipient_phone: r.phone || null,
            google_review_url: googleReviewUrl,
            status: 'pending',
            expires_at: expiresAt.toISOString()
        }));

        const { data: inserted, error } = await FINOX.supabase
            .from('signature_requests')
            .insert(insertRows)
            .select('token, recipient_type, recipient_name');

        if (error) throw error;

        // Afficher le modal avec les liens (un par destinataire, chacun avec son mot de passe)
        showSignatureLinkModal(inserted, recipients);
        loadSignatures();

        const count = inserted.length;
        FINOX.showNotification(`✅ ${count} demande${count > 1 ? 's' : ''} créée${count > 1 ? 's' : ''}!`, 'success');
    } catch (error) {
        console.error('Erreur:', error);
        FINOX.showNotification('❌ Erreur: ' + error.message, 'error');
    }
};

// Modal de choix de destinataire (client / conjoint / les deux)

        const modal = document.createElement('div');
        modal.id = 'recipientChoiceModal';
        modal.innerHTML = `
            <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:10000;padding:20px;">
                <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;padding:32px;max-width:480px;width:100%;">
                    <div style="text-align:center;margin-bottom:24px;">
                        <div style="font-size:40px;margin-bottom:12px;">✍️</div>
                        <h2 style="color:var(--gold);margin-bottom:8px;font-size:18px;">Envoyer pour signature</h2>
                        <p style="color:var(--text-secondary);font-size:13px;">À qui souhaitez-vous envoyer la demande?</p>
                    </div>

                    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px;">
                        <button id="rcChoice-client" style="display:flex;align-items:center;gap:12px;padding:16px;background:var(--bg-secondary);border:2px solid var(--border-color);border-radius:12px;cursor:pointer;text-align:left;transition:all .2s;" onmouseenter="this.style.borderColor='var(--gold)'" onmouseleave="this.style.borderColor='var(--border-color)'">
                            <span style="font-size:24px;">👤</span>
                            <div style="flex:1;">
                                <div style="font-weight:600;color:var(--text-primary);font-size:14px;">${FINOX.escapeHtml(clientName)} seulement</div>
                                <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">🔐 Mot de passe: <span style="font-family:monospace;color:var(--gold);font-weight:700;">${clientPwd}</span> (4 derniers du tél. client)</div>
                            </div>
                        </button>

                        <button id="rcChoice-conjoint" style="display:flex;align-items:center;gap:12px;padding:16px;background:var(--bg-secondary);border:2px solid var(--border-color);border-radius:12px;cursor:pointer;text-align:left;transition:all .2s;" onmouseenter="this.style.borderColor='var(--gold)'" onmouseleave="this.style.borderColor='var(--border-color)'">
                            <span style="font-size:24px;">👫</span>
                            <div style="flex:1;">
                                <div style="font-weight:600;color:var(--text-primary);font-size:14px;">${FINOX.escapeHtml(conjointName)} seulement</div>
                                <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">🔐 Mot de passe: <span style="font-family:monospace;color:var(--gold);font-weight:700;">${conjointPwd}</span> (4 derniers du tél. conjoint)</div>
                            </div>
                        </button>

                        <button id="rcChoice-both" style="display:flex;align-items:center;gap:12px;padding:16px;background:var(--bg-secondary);border:2px solid rgba(34,197,94,.4);border-radius:12px;cursor:pointer;text-align:left;transition:all .2s;" onmouseenter="this.style.borderColor='#22c55e'" onmouseleave="this.style.borderColor='rgba(34,197,94,.4)'">
                            <span style="font-size:24px;">👥</span>
                            <div style="flex:1;">
                                <div style="font-weight:600;color:var(--text-primary);font-size:14px;">Les deux</div>
                                <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">Une demande séparée pour ${FINOX.escapeHtml(clientName)} et ${FINOX.escapeHtml(conjointName)}</div>
                                <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">🔐 Mots de passe différents pour chaque personne</div>
                            </div>
                        </button>
                    </div>

                    <button id="rcChoice-cancel" style="width:100%;padding:12px;background:transparent;border:1px solid var(--border-color);color:var(--text-secondary);border-radius:10px;cursor:pointer;font-size:13px;">Annuler</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        modal.querySelector('#rcChoice-client').onclick = () => { modal.remove(); resolve(['client']); };
        modal.querySelector('#rcChoice-conjoint').onclick = () => { modal.remove(); resolve(['conjoint']); };
        modal.querySelector('#rcChoice-both').onclick = () => { modal.remove(); resolve(['client', 'conjoint']); };
        modal.querySelector('#rcChoice-cancel').onclick = () => { modal.remove(); resolve(null); };
    });
}

// Generate SHA-256 hash using Web Crypto API (LCCJTI compliance)
async function generateSHA256Hash(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function generateToken() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let token = '';
    for (let i = 0; i < 32; i++) token += chars.charAt(Math.floor(Math.random() * chars.length));
    return token;
}

function showSignatureLinkModal(requests, recipientsList) {
    // requests = array of { token, recipient_type, recipient_name }
    // recipientsList = array of { type, name, email, phone, password }
    const multi = requests.length > 1;

    // Construire les blocs par destinataire
    const recipientBlocks = requests.map((req, idx) => {
        const url = `${SIGNATURE_PAGE_URL}?token=${req.token}`;
        const rType = req.recipient_type || 'client';
        const rName = req.recipient_name || 'Client';
        const icon = rType === 'conjoint' ? '👫' : '👤';
        const email = rType === 'conjoint' ? clientData.conjoint_email : clientData.email;
        const phone = rType === 'conjoint' ? clientData.conjoint_phone : clientData.phone;
        // Mot de passe individuel pour chaque destinataire
        const rInfo = recipientsList.find(r => r.type === rType);
        const pwd = rInfo ? rInfo.password : '';

        return `
            <div style="background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:12px;padding:16px;margin-bottom:12px;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
                    <span style="font-size:16px;">${icon}</span>
                    <span style="font-weight:600;color:var(--text-primary);font-size:13px;">${rName}</span>
                    <span class="sig-recipient ${rType}">${rType === 'conjoint' ? 'Conjoint' : 'Client'}</span>
                    <span style="margin-left:auto;font-size:11px;color:var(--text-muted);">🔐 <span style="font-family:monospace;color:var(--gold);font-weight:700;letter-spacing:2px;">${pwd}</span></span>

window.sendSignatureSms = async function(url, password, target, btn) {
    if (!btn) return;
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '⏳...';

    // Déterminer les destinataires
    const recipients = [];
    if (target === 'client' || target === 'both') {
        if (clientData.phone) recipients.push({ phone: clientData.phone, name: clientData.first_name });
    }
    if (target === 'conjoint' || target === 'both') {
        if (clientData.conjoint_phone) recipients.push({ phone: clientData.conjoint_phone, name: clientData.conjoint_first_name });
    }

    if (recipients.length === 0) {
        FINOX.showNotification('❌ Aucun numéro de téléphone disponible', 'error');
        btn.innerHTML = originalText;
        btn.disabled = false;
        return;
    }

    try {
        const user = FINOX.getCurrentUser();
        if (!user?.id) throw new Error('Utilisateur non connecté');
        const conseiller = getConseillerInfo();

        for (const r of recipients) {
            const smsText = `Bonjour ${r.name}, veuillez signer votre Analyse des Besoins Financiers:\n${url}\nMot de passe: ${password}\nCe lien expire dans 7 jours.\n— ${conseiller.firstName || ''} ${conseiller.lastName || ''}, FINOX`;

            const response = await fetch(RINGCENTRAL_WORKER + '/sms/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to: r.phone, text: smsText, user_id: user.id })
            });
            const data = await response.json();

            if (data.error === 'RC_NOT_CONNECTED') {
                // Proposer la connexion RC directement
                const connectNow = confirm('RingCentral non connecté.\n\nVoulez-vous connecter votre compte RingCentral maintenant?');
                if (connectNow) {
                    const user = FINOX.getCurrentUser();
                    const returnUrl = encodeURIComponent(window.location.href);
                    const authUrl = RINGCENTRAL_WORKER + '/oauth/start?user_id=' + user.id + '&return_url=' + returnUrl;
                    window.open(authUrl, 'RingCentral OAuth', 'width=600,height=700,scrollbars=yes');
                }
                btn.innerHTML = originalText;
                btn.disabled = false;
                return;
            }
            if (data.error) throw new Error(data.error);

            FINOX.addTimelineEntry('sms_outbound', `Lien de signature envoyé par texto à ${r.name}`, `SMS envoyé à ${r.phone} avec le lien de signature ABF`);
        }

        btn.innerHTML = '✅ Envoyé!';
        btn.style.background = 'var(--gold)';
        btn.style.color = '#000';
        const names = recipients.map(r => r.name).join(' & ');
        FINOX.showNotification(`✅ Texto envoyé à ${names}`, 'success');

    } catch (error) {
        console.error('Erreur envoi SMS signature:', error);
        FINOX.showNotification('❌ ' + error.message, 'error');
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
};

window.openMailClient = async function(url, password, target) {
    target = target || 'client';
    const conseiller = getConseillerInfo();

    // Déterminer les destinataires
    const emails = [];
    const names = [];
    if (target === 'client' || target === 'both') {
        if (clientData.email) { emails.push(clientData.email); names.push(clientData.first_name || 'Client'); }
    }
    if (target === 'conjoint' || target === 'both') {
        if (clientData.conjoint_email) { emails.push(clientData.conjoint_email); names.push(clientData.conjoint_first_name || 'Conjoint'); }
    }

    if (emails.length === 0) {
        FINOX.showNotification('❌ Aucun courriel disponible pour ce contact', 'error');
        return;
    }

    const greeting = names.join(' & ');
    const subject = 'Signature de votre Analyse des Besoins Financiers';
    const body = `Bonjour ${greeting},\n\nSuite à notre rencontre, veuillez trouver ci-dessous le lien pour signer votre Analyse des Besoins Financiers.\n\n🔗 Cliquez ici pour signer :\n${url}\n\n🔐 Mot de passe : ${password}\n(4 derniers chiffres de votre numéro de téléphone)\n\n⏰ Ce lien expire dans 7 jours.\n\nN'hésitez pas à me contacter si vous avez des questions.\n\nCordialement,`;
    const signature = FINOX.getEmailSignature ? FINOX.getEmailSignature() : '';

    // Envoyer directement via Gmail API
    try {
        const token = await getMsgGoogleToken();
        if (!token) {
            FINOX.showNotification('❌ Google non connecté', 'error');
            return;
        }

        await GmailDirect.send({
            token,
            to: emails.join(','),
            subject,
            body,
            signature
        });

        FINOX.showNotification('📧 Courriel envoyé à ' + greeting + '!', 'success');

        // Ajouter à la timeline
        FINOX.addTimelineEntry('email_outbound', `Lien de signature envoyé par courriel à ${greeting}`, `Email envoyé à ${emails.join(', ')} avec le lien de signature ABF`);
    } catch (err) {
        console.error('[Signature] Erreur envoi email:', err);
        FINOX.showNotification('❌ Erreur envoi: ' + err.message, 'error');
    }
};

async function loadAllData(sections) {
    sections = sections || {};
    const CLIENT = FINOX.CLIENT_ID;
    const [enfantsRes, actifsRes, assurVigueurRes, assurVenduesRes, budgetRes] = await Promise.all([
        FINOX.supabase.from('abf_enfants').select('*').eq('client_id', CLIENT).order('ordre'),
        FINOX.supabase.from('abf_actifs').select('*').eq('client_id', CLIENT).order('ordre'),
        FINOX.supabase.from('abf_assurances').select('*').eq('client_id', CLIENT).order('ordre'),
        FINOX.supabase.from('assurances_vendues').select('*').eq('client_id', CLIENT),
        FINOX.supabase.from('abf_budget').select('*').eq('client_id', CLIENT).order('ordre')
    ]);
    // Calculer le budget à partir des lignes individuelles
    const budgetRows = budgetRes.data || [];
    let budgetSummary = null;
    if (budgetRows.length > 0) {
        const toMonthly = (row) => {
            const amt = parseFloat(row.amount) || 0;
            if (row.frequency === 'annual' || row.frequency === 'annuel') return amt / 12;
            if (row.frequency === 'biweekly' || row.frequency === 'aux_2_semaines') return amt * 26 / 12;
            if (row.frequency === 'weekly' || row.frequency === 'hebdomadaire') return amt * 52 / 12;
            return amt; // monthly par défaut
        };
        const revenus = budgetRows.filter(r => r.category === 'revenus').reduce((s, r) => s + toMonthly(r), 0);
        const depCategories = ['habitation','transport','alimentation','dettes','assurances','loisirs'];
        const depenses = budgetRows.filter(r => depCategories.includes(r.category)).reduce((s, r) => s + toMonthly(r), 0);
        const epargne = budgetRows.filter(r => r.category === 'epargne').reduce((s, r) => s + toMonthly(r), 0);
        budgetSummary = { revenus_total: revenus, depenses_total: depenses, epargne_total: epargne, surplus_deficit: revenus - depenses - epargne };
    }

    // ═══ RETRAITE: charger moteur + lancer simulation ═══
    let retirement = null;
    const saved = clientData.abf_data?.retraite;
    const anyRetSection = sections.retSommaire || sections.retProjection || sections.retRevenus || sections.retSuccession || sections.retPlanAction;

    if (saved && anyRetSection) {
        try {
            // Charger moteur si necessaire
            if (!window.FINOX_DECAISSEMENT) {
                await new Promise((resolve, reject) => {
                    const s = document.createElement('script');
                    s.src = 'shared/decaissement-engine.js';
                    s.onload = resolve;
                    s.onerror = () => reject(new Error('Engine load failed'));
                    document.head.appendChild(s);
                });
            }
            const ENGINE = window.FINOX_DECAISSEMENT;
            const abfActifs = actifsRes.data || [];

            // 1. Profile
            const profile = ENGINE.getDefaultProfile(clientData);
            profile.lifeExpectancy = saved.life_expectancy || 92;

            // 2. Comptes depuis ABF actifs
            const accounts = ENGINE.getDefaultAccounts(clientData, abfActifs);

            // 3. Accumulation
            const accum = ENGINE.getDefaultAccumulation(clientData, accounts);
            if (saved.salary_growth) accum.salaryGrowthRate = saved.salary_growth;
            if (saved.target_income) accum.targetRetirementIncome = saved.target_income;
            if (saved.rrsp_contribution_room) accum.rrspContributionRoom = saved.rrsp_contribution_room;
            if (saved.tfsa_contribution_room) accum.tfsaContributionRoom = saved.tfsa_contribution_room;

            // 4. Pensions
            const pens = ENGINE.getDefaultPensions(clientData);
            if (saved.pensions) {
                if (saved.pensions.qppStartAge) pens.qppStartAge = saved.pensions.qppStartAge;
                if (saved.pensions.oasStartAge) pens.oasStartAge = saved.pensions.oasStartAge;
                if (saved.pensions.qppAmountAt65) pens.qppAmountAt65 = saved.pensions.qppAmountAt65;
                if (saved.pensions.oasAmountAt65) pens.oasAmountAt65 = saved.pensions.oasAmountAt65;
                if (saved.pensions.hasEmployerPension) {
                    pens.hasEmployerPension = true;
                    pens.employerPensionType = saved.pensions.employerPensionType || 'prive';
                    pens.employerPensionAmount = saved.pensions.employerPensionAmount || 0;
                    pens.employerPensionStartAge = saved.pensions.employerPensionStartAge || 65;
                    pens.employerPensionIndexed = saved.pensions.employerPensionIndexed || false;
                    pens.employerPensionBridge = saved.pensions.employerPensionBridge || false;
                    pens.employerPensionBridgeAmount = saved.pensions.employerPensionBridgeAmount || 0;
                }
            }

            // 5. Options
            const opts = ENGINE.getDefaultOptions();
            opts.inflationRate = saved.inflation_rate || 2.0;
            opts.withdrawalStrategy = saved.withdrawal_strategy || 'proportional';
            opts.targetIncome = saved.target_income || 50000;
            if (saved.expense_phases) {
                opts.expensePhases = { ...opts.expensePhases, ...saved.expense_phases };
                if (!saved.expense_phases.slowgoEnd && saved.expense_phases.gogoEnd) {
                    opts.expensePhases.slowgoEnd = saved.expense_phases.gogoEnd + 10;
                }
            }
            if (saved.pension_splitting) {
                opts.pensionSplitting = true;
                opts.spouseIncome = saved.spouse_income || 0;
                opts.spouseAge = saved.spouse_age || 0;
            }
            if (saved.retirement_returns) opts.retirementReturns = saved.retirement_returns;
            if (saved.insurance) {
                opts.insuranceAnnualPremium = (saved.insurance.monthly_premium || 0) * 12;
                opts.insuranceDeathBenefit = saved.insurance.death_benefit || 0;
                opts.insuranceStartAge = saved.insurance.start_age || profile.retirementAge;
            }

            // 6. Simulation
            const projData = ENGINE.generateProjectionData(
                profile.currentAge, profile.retirementAge, profile.lifeExpectancy,
                saved.scenario || 'base', accounts, pens, accum, saved.lifeEvents || [], opts
            );

            // 7. KPIs
            const retData = projData.filter(d => d.phase === 'decaissement');
            const lastYear = projData[projData.length - 1];
            const retYear = projData.find(d => d.phase === 'decaissement');
            const kpis = {
                peakTotal: Math.max(...projData.map(d => d.total)),
                retirementAssets: retYear ? retYear.total : 0,
                firstNetIncome: retYear ? retYear.netIncome : 0,
                avgNetIncome: retData.length > 0 ? Math.round(retData.reduce((s, d) => s + d.netIncome, 0) / retData.length) : 0,
                totalTax: retData.reduce((s, d) => s + (d.totalTax || 0), 0),
                totalCredits: retData.reduce((s, d) => s + (d.totalCredits || 0), 0),
                finalAssets: lastYear ? lastYear.total : 0,
                estateTax: lastYear ? (lastYear.estateTax || 0) : 0,
                avgMarginalRate: retData.length > 0 ? (retData.reduce((s, d) => s + (d.marginalRate || 0), 0) / retData.length).toFixed(1) : '0',
            };

            // 8. Succession (conditionnel)
            let succResult = null;
            if (sections.retSuccession && opts.insuranceAnnualPremium > 0) {
                try {
                    succResult = ENGINE.runSuccessionComparison(
                        { type: pens.maritalStatus || 'single', currentAge: profile.currentAge, retirementAge: profile.retirementAge, lifeExpectancy: profile.lifeExpectancy },
                        saved.scenario || 'base', accounts, pens, accum, saved.lifeEvents || [], opts, function(){}
                    );
                } catch(e) { console.warn('Succession calc failed:', e); }
            }

            // 9. Analyse d'ecart & Plan d'action (conditionnel)
            let gapResult = null;
            if (sections.retPlanAction && ENGINE.analyzeRetirementGap) {
                try {
                    const gapProfile = { currentAge: profile.currentAge, retirementAge: profile.retirementAge, lifeExpectancy: profile.lifeExpectancy };
                    gapResult = ENGINE.analyzeRetirementGap(gapProfile, saved.scenario || 'base', accounts, pens, accum, saved.lifeEvents || [], opts);
                } catch(e) { console.warn('Gap analysis failed:', e); }
            }

            retirement = {
                projectionData: projData,
                kpis,
                succResult,
                gapResult,
                savedParams: saved,
                profile,
                accounts,
                accumulation: accum,
                options: opts,
                pensions: pens,
            };
        } catch (e) {
            console.warn('⚠️ Retraite engine load/calc failed:', e);
        }
    }

    return {
        client: clientData,
        enfants: enfantsRes.data || [],
        actifs: actifsRes.data || [],
        assurancesVigueur: assurVigueurRes.data || [],
        assurancesVendues: assurVenduesRes.data || [],
        budget: budgetSummary,
        retirement
    };
}

    // ═══ RECOMMANDATIONS DÉTAILLÉES v2.0 ═══
    const getRecoClass = (d) => { if (!d) return ''; const dl = (d||'').toLowerCase(); if (dl.includes('accept')) return 'acceptee'; if (dl.includes('refus')) return 'refusee'; return 'reporter'; };
    const recos = abfData.recommandations || {};
    const formatRecoDecision = (d) => { const m = {"J'accepte":'Acceptée',"Je refuse":'Refusée',"À faire":'À faire',"A faire":'À faire','N/A':'N/A'}; return m[d] || d || 'Non défini'; };
    const formatRecoRaison = (r) => { const m = {'pas_interesse':'Pas intéressé(e)','montant_superieur':'Montant supérieur suggéré','montant_inferieur':'Montant inférieur','montant_different':'Montant différent'}; return m[r] || r || ''; };
    const formatRecoDelai = (d) => { const m = {'prochaine_rencontre':'Prochaine rencontre','quelques_mois':'Dans quelques mois','budget_permet':'Quand le budget le permet'}; return m[d] || d || ''; };

    // Besoins calcules depuis abfData (memes sources que conformite-recommandations)
    const getNumVal = (v) => { if (!v) return 0; const n = typeof v === 'string' ? parseFloat(v.replace(/[^0-9.-]/g, '')) : Number(v); return isNaN(n) ? 0 : n; };
    const besoins = {
        client: {
            vie: getNumVal(abfData.vie_client?.besoin_calcule),
            maladie: getNumVal(abfData.mg_besoin_client),
            invalidite: getNumVal(abfData.inv_client?.besoin_calcule),
            pret: 0, epargne: 0
        },
        conjoint: {
            vie: getNumVal(abfData.vie_conjoint?.besoin_calcule),
            maladie: getNumVal(abfData.mg_besoin_conjoint),
            invalidite: getNumVal(abfData.inv_conjoint?.besoin_calcule),
            pret: 0, epargne: 0
        }
    };
    // Calculer besoins pret/epargne depuis actifs
    (actifs || []).forEach(a => {
        const prop = (a.proprietaire || '').toLowerCase();
        const cliName = (client.first_name + ' ' + client.last_name).toLowerCase();
        const conjName = ((client.conjoint_first_name || '') + ' ' + (client.conjoint_last_name || '')).toLowerCase().trim();
        if (a.paiement_mensuel > 0) {
            if (prop === cliName || prop === 'client' || prop === 'les deux') besoins.client.pret += a.paiement_mensuel;
            if (prop === conjName || prop === 'conjoint' || prop === 'les deux') besoins.conjoint.pret += a.paiement_mensuel;
        }
        if (a.type !== 'RRPD') {
            const contrib = (a.contribution_mensuelle || 0) + (a.contribution_employeur || 0);
            if (contrib > 0) {
                if (prop === cliName || prop === 'client') besoins.client.epargne += contrib;
                else if (prop === conjName || prop === 'conjoint') besoins.conjoint.epargne += contrib;
                else if (prop === 'les deux') { besoins.client.epargne += contrib / 2; besoins.conjoint.epargne += contrib / 2; }
            }
        }
    });

    function buildRecoTable(personKey, personName) {
        const types = [
            { key: 'vie', label: 'Assurance Vie', suffix: '' },
            { key: 'maladie', label: 'Maladie Grave', suffix: '' },
            { key: 'invalidite', label: 'Invalidité', suffix: '/mois' },
            { key: 'pret', label: 'Protection Prêt', suffix: '/mois' },
            { key: 'epargne', label: 'Épargne', suffix: '/mois' }
        ];
        const personRecos = recos[personKey] || {};
        const personBesoins = besoins[personKey] || {};
        const rows = types.map(t => {
            const r = personRecos[t.key] || {};
            if (!r.decision || r.decision === 'N/A') return '';
            const cls = getRecoClass(r.decision);
            const besoinVal = t.key === 'epargne' ? personBesoins.epargne : personBesoins[t.key];
            const besoinStr = besoinVal > 0 ? formatMoney(besoinVal) + t.suffix : '-';

            // Montant retenu/choisi
            let montantRetenu = '-';
            if (t.key === 'epargne' && r.montant_mensuel) {
                montantRetenu = formatMoney(r.montant_mensuel) + '/mois';
            } else if (r.montant) {
                montantRetenu = formatMoney(r.montant) + t.suffix;
            }

            // Decision badge
            const decisionLabel = formatRecoDecision(r.decision);
            const badgeColor = cls === 'acceptee' ? '#22c55e' : cls === 'refusee' ? '#ef4444' : '#3b82f6';
            const badgeBg = cls === 'acceptee' ? 'rgba(34,197,94,0.1)' : cls === 'refusee' ? 'rgba(239,68,68,0.1)' : 'rgba(59,130,246,0.1)';

            // Details (raison, compagnie, delai)
            let detailParts = [];
            if (r.decision === 'Je refuse' && r.raison) detailParts.push(formatRecoRaison(r.raison));
            if ((r.decision === 'À faire' || r.decision === 'A faire') && r.delai) detailParts.push('Délai: ' + formatRecoDelai(r.delai));
            if (r.compagnie) detailParts.push('Compagnie: ' + r.compagnie);
            const detailStr = detailParts.length > 0 ? `<div style="font-size:7px;color:#888;margin-top:2px;">${detailParts.join(' | ')}</div>` : '';

            return `<tr>
                <td style="font-weight:600;">${t.label}</td>
                <td class="text-right">${besoinStr}</td>
                <td class="text-center"><span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:8px;font-weight:600;color:${badgeColor};background:${badgeBg};">${decisionLabel}</span></td>
                <td class="text-right currency">${montantRetenu}</td>
                <td>${r.compagnie || '-'}${detailStr}</td>
            </tr>`;
        }).filter(Boolean).join('');

        if (!rows) return '';

        return `
            <div style="margin-bottom:16px;">
                <div style="font-size:11px;font-weight:700;margin-bottom:6px;color:#1a1a2e;">${personName}</div>
                <table>
                    <thead>
                        <tr>
                            <th>Type de besoin</th>
                            <th class="text-right">Besoin calculé</th>
                            <th class="text-center">Décision</th>
                            <th class="text-right">Montant retenu</th>
                            <th>Compagnie / Détail</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
    }

    // Textes de conformite (declarations signees)
    function buildConformiteTexts(personKey, prenom) {
        const types = [
            { key: 'vie', label: 'assurance vie', suffix: '' },
            { key: 'maladie', label: 'maladie grave', suffix: '' },
            { key: 'invalidite', label: 'invalidité', suffix: '/mois' },
            { key: 'pret', label: 'protection prêt', suffix: '/mois' },
            { key: 'epargne', label: 'épargne', suffix: '/mois' }
        ];
        const personRecos = recos[personKey] || {};
        const personBesoins = besoins[personKey] || {};
        const texts = types.map(t => {
            const r = personRecos[t.key] || {};
            if (!r.decision || r.decision === 'N/A') return '';
            const besoinVal = t.key === 'epargne' ? personBesoins.epargne : personBesoins[t.key];
            const besoinStr = besoinVal > 0 ? formatMoney(besoinVal) + t.suffix : '';
            let text = '';

            if (r.decision === "J'accepte") {
                if (t.key === 'epargne' && r.montant_mensuel) {
                    text = besoinStr
                        ? `<strong>Déclaration de ${prenom}:</strong> Mon conseiller m'a présenté une analyse de besoins financiers avec une recommandation d'épargne de <strong>${besoinStr}</strong>. J'accepte cette recommandation avec un prélèvement mensuel de <strong>${formatMoney(r.montant_mensuel)}/mois</strong>.`
                        : `<strong>Déclaration de ${prenom}:</strong> J'accepte la recommandation d'épargne de mon conseiller avec un prélèvement mensuel de <strong>${formatMoney(r.montant_mensuel)}/mois</strong>.`;
                } else if (r.montant && besoinStr) {
                    text = `<strong>Déclaration de ${prenom}:</strong> Mon conseiller m'a présenté une analyse de besoins financiers indiquant un besoin en ${t.label} de <strong>${besoinStr}</strong>. J'accepte cette recommandation avec un montant de couverture retenu de <strong>${formatMoney(r.montant)}${t.suffix}</strong>.`;
                } else if (besoinStr) {
                    text = `<strong>Déclaration de ${prenom}:</strong> J'accepte la recommandation de mon conseiller pour une couverture en ${t.label} de <strong>${besoinStr}</strong>.`;
                }
                if (r.compagnie) text += ` Compagnie: <strong>${r.compagnie}</strong>.`;
            } else if (r.decision === 'Je refuse') {
                if (r.raison === 'pas_interesse') {
                    text = `<strong>Déclaration de ${prenom}:</strong> Je reconnais que mon conseiller m'a présenté une analyse de besoins financiers indiquant un besoin en ${t.label} de <strong>${besoinStr || 'N/A'}</strong>. Après avoir pris connaissance de cette recommandation, je choisis de ne pas donner suite. Je comprends les implications de cette décision.`;
                } else if (r.raison === 'montant_superieur') {
                    const montantChoisi = r.montant ? formatMoney(r.montant) + t.suffix : '[à préciser]';
                    text = `<strong>Déclaration de ${prenom}:</strong> Je reconnais que mon conseiller m'a présenté une analyse de besoins financiers indiquant un besoin en ${t.label} de <strong>${besoinStr || 'N/A'}</strong>. Après réflexion, je choisis de souscrire à une protection de <strong>${montantChoisi}</strong>, soit un montant supérieur à la recommandation.`;
                    if (r.compagnie) text += ` Compagnie: <strong>${r.compagnie}</strong>.`;
                } else if (r.raison === 'montant_inferieur') {
                    const montantChoisi = r.montant ? formatMoney(r.montant) + t.suffix : '[à préciser]';
                    text = `<strong>Déclaration de ${prenom}:</strong> Je reconnais que mon conseiller m'a présenté une analyse de besoins financiers indiquant un besoin en ${t.label} de <strong>${besoinStr || 'N/A'}</strong>. Après réflexion, je choisis de souscrire à une protection de <strong>${montantChoisi}</strong>, soit un montant inférieur à la recommandation. Je comprends que cette couverture partielle ne répond pas entièrement à mes besoins identifiés.`;
                    if (r.compagnie) text += ` Compagnie: <strong>${r.compagnie}</strong>.`;
                } else if (r.raison === 'montant_different' && t.key === 'epargne') {
                    const mensuel = r.montant_mensuel ? formatMoney(r.montant_mensuel) + '/mois' : '[à préciser]';
                    text = `<strong>Déclaration de ${prenom}:</strong> Je reconnais que mon conseiller m'a présenté une analyse de besoins financiers avec une recommandation d'épargne de <strong>${besoinStr || 'N/A'}</strong>. Après réflexion, je choisis d'épargner <strong>${mensuel}</strong> en prélèvement automatique.`;
                }
            } else if (r.decision === 'À faire' || r.decision === 'A faire') {
                text = `<strong>Déclaration de ${prenom}:</strong> Je souhaite donner suite à la recommandation en ${t.label} de <strong>${besoinStr || 'N/A'}</strong>.`;
                if (r.delai) text += ` Délai: <strong>${formatRecoDelai(r.delai)}</strong>.`;
            }

            if (!text) return '';
            const cls = getRecoClass(r.decision);
            const borderColor = cls === 'acceptee' ? '#22c55e' : cls === 'refusee' ? '#ef4444' : '#3b82f6';
            return `<div style="border-left:3px solid ${borderColor};padding:8px 12px;margin-bottom:8px;background:#fafafa;border-radius:0 6px 6px 0;font-size:9px;line-height:1.6;">${text}</div>`;
        }).filter(Boolean).join('');
        return texts;

                    <div style="margin-top:8px;font-size:11px;color:var(--text-muted);">Type: ${sig.signature_type === 'drawn' ? 'Dessinée' : 'Tapée'}</div>
                </div>
                
                <!-- Audit Trail -->
                <div style="background:var(--bg-secondary);padding:16px;border-radius:10px;margin-bottom:24px;">
                    <h3 style="font-size:14px;color:var(--text-muted);margin-bottom:12px;">🔒 PISTE D'AUDIT</h3>
                    <div style="display:grid;gap:8px;font-size:12px;">
                        <div><span style="color:var(--text-muted);">Date de signature:</span> <strong>${formatDateTime(sig.signed_at)}</strong></div>
                        <div><span style="color:var(--text-muted);">Adresse IP:</span> <strong>${sig.client_ip || 'Non capturée'}</strong></div>
                        <div><span style="color:var(--text-muted);">Token unique:</span> <code style="background:var(--bg-primary);padding:2px 6px;border-radius:4px;font-size:11px;">${sig.token}</code></div>
                        <div><span style="color:var(--text-muted);">Navigateur:</span> <span style="font-size:11px;word-break:break-all;">${sig.user_agent || '-'}</span></div>
                        <div><span style="color:var(--text-muted);">Consulté:</span> ${sig.view_count || 0} fois (première: ${formatDateTime(sig.viewed_at)})</div>
                        <div><span style="color:var(--text-muted);">Créé le:</span> ${formatDateTime(sig.created_at)}</div>
                        <div><span style="color:var(--text-muted);">Expirait le:</span> ${formatDate(sig.expires_at)}</div>
                    </div>
                </div>
                
                <!-- Boutons -->
                <div style="display:flex;gap:12px;">
                    <button onclick="generateAuditPDF(${index})" style="flex:1;padding:14px;background:var(--gold);color:#000;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-size:14px;">
                        📄 Télécharger la preuve PDF
                    </button>
                    <button onclick="viewSignedDocument(${index})" style="flex:1;padding:14px;background:transparent;border:1px solid var(--border-color);color:var(--text-primary);border-radius:10px;font-weight:600;cursor:pointer;font-size:14px;">
                        📋 Voir le document signé
                    </button>
                </div>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
};

window.generateAuditPDF = function(index) {
    const sig = window.signaturesData[index];

    const conseiller = getConseillerInfo();
    
    const html = `<!DOCTYPE html>
<html lang="fr">
<head>

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; padding: 0 16px; }
        .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 11px; }
        .info-label { color: #666; }
        .info-value { font-weight: 500; }
        .consent-item { display: flex; align-items: center; gap: 8px; padding: 6px 16px; font-size: 11px; }
        .consent-yes { color: #22c55e; }
        .consent-no { color: #ef4444; }
        .signature-box { text-align: center; padding: 20px; background: #fff; border: 2px solid #C9A227; border-radius: 8px; margin: 16px; }
        .signature-box img { max-width: 300px; max-height: 100px; }
        .signature-typed { font-family: 'Brush Script MT', cursive; font-size: 36px; color: #000; }
        .audit-box { background: #f8f9fa; padding: 16px; border-radius: 8px; margin: 16px; font-size: 10px; }
        .audit-row { display: flex; gap: 8px; margin-bottom: 6px; }
        .audit-label { color: #666; min-width: 120px; }
        .footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 10px; color: #666; }
        .legal { background: #fffbeb; border: 1px solid #fcd34d; padding: 12px 16px; border-radius: 8px; margin-top: 24px; font-size: 10px; }
        @media print { body { padding: 20px; } }
        .print-bar { position: fixed; top: 0; left: 0; right: 0; background: #C9A227; color: #000; padding: 12px; text-align: center; font-weight: 600; }
        .print-bar button { background: #1a1a2e; color: #fff; border: none; padding: 6px 16px; border-radius: 4px; margin-left: 12px; cursor: pointer; }
        @media print { .print-bar { display: none; } }
    </style>
</head>
<body>
    <div class="print-bar">Ctrl+P pour sauvegarder en PDF <button onclick="window.print()">Imprimer</button></div>
    
    <div class="header">
        <img src="https://www.finox.ca/FIN%20X-1.png" alt="FINOX">
        <h1>Certificat de Signature Électronique</h1>
        <p>Document généré le ${new Date().toLocaleString('fr-CA')}</p>
    </div>
    
    <div class="section">
        <div class="section-title">${(sig.recipient_type || 'client') === 'conjoint' ? '👫' : '👤'} Informations du Signataire</div>
        <div class="info-grid">
            <div class="info-row"><span class="info-label">Signataire</span><span class="info-value">${sig.recipient_name || sig.client_name || '-'} (${(sig.recipient_type || 'client') === 'conjoint' ? 'Conjoint' : 'Client'})</span></div>
            <div class="info-row"><span class="info-label">Dossier client</span><span class="info-value">${sig.client_name || '-'}</span></div>
            <div class="info-row"><span class="info-label">Courriel</span><span class="info-value">${sig.recipient_email || sig.client_email || '-'}</span></div>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">✅ Consentements Accordés</div>
        <div class="consent-item"><span class="${sig.consent_read_document ? 'consent-yes' : 'consent-no'}">${sig.consent_read_document ? '✓' : '✗'}</span> A lu et compris l'intégralité du document</div>
        <div class="consent-item"><span class="${sig.consent_info_accurate ? 'consent-yes' : 'consent-no'}">${sig.consent_info_accurate ? '✓' : '✗'}</span> Confirme que les informations sont exactes et complètes</div>
        <div class="consent-item"><span class="${sig.consent_contact ? 'consent-yes' : 'consent-no'}">${sig.consent_contact ? '✓' : '✗'}</span> Accepte d'être contacté par le conseiller</div>
        <div class="consent-item"><span class="${sig.consent_electronic_signature ? 'consent-yes' : 'consent-no'}">${sig.consent_electronic_signature ? '✓' : '✗'}</span> Accepte la valeur légale de la signature électronique</div>

    <div class="section">

            <div class="audit-row"><span class="audit-label">Première consultation:</span>${sig.viewed_at ? new Date(sig.viewed_at).toLocaleString('fr-CA') : '-'}</div>

    <div class="legal">
        <strong>⚖️ Validité Légale</strong><br>

    <div class="footer">
        <p><strong>FINOX Services Financiers</strong></p>
        <p>Conseiller: ${conseiller.firstName || ''} ${conseiller.lastName || ''} | ${conseiller.email || ''} | ${conseiller.phone || ''}</p>
        <p style="margin-top:8px;">Document confidentiel - Conserver pour vos dossiers</p>
    </div>
</body>
</html>`;
    
    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
    FINOX.showNotification('✅ Preuve d\'audit générée!', 'success');
};

window.viewSignedDocument = function(index) {
    const sig = window.signaturesData[index];
    if (!sig || !sig.document_html) {
        FINOX.showNotification('❌ Document non disponible', 'error');
        return;
    }
    
    // Injecter la signature dans le document
    const signatureHtml = sig.signature_type === 'drawn' 
        ? `<img src="${sig.signature_data}" style="max-height:80px;">`
        : `<span style="font-family:'Brush Script MT',cursive;font-size:28px;">${sig.signature_data}</span>`;
    
    const docWithSignature = sig.document_html.replace('</body>', `
        <div style="page-break-before:always;padding:40px;text-align:center;">
            <h2 style="color:#C9A227;margin-bottom:20px;">✅ Document Signé Électroniquement</h2>
            <div style="border:2px solid #C9A227;padding:20px;border-radius:8px;display:inline-block;background:#fff;">
                ${signatureHtml}
            </div>
            <p style="margin-top:12px;font-size:12px;color:#666;">Signé le ${new Date(sig.signed_at).toLocaleString('fr-CA')}</p>
        </div>
    </body>`);
    
    const win = window.open('', '_blank');
    win.document.write(docWithSignature);
    win.document.close();
};

console.log('✅ Module Export & Signature v5.0 chargé');
</script>
