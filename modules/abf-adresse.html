<style>
/* ─── Renewal Cards Grid ─── */
.renewal-grid {

}
.renewal-card {

}

.renewal-card-icon.gold { background: linear-gradient(135deg, rgba(232,180,77,0.2), rgba(232,180,77,0.08)); }

}

}

}

/* Navigation */

    font-weight: 600;

    display: flex;

.nav-btn-prev {
    background: var(--finox-gray, #2b2b2b);
    border: 2px solid var(--border-color);
    color: var(--text-muted);
}

.nav-btn-next {
    background: linear-gradient(135deg, var(--gold), #d4a03d);

/* Responsive */

</style>

<script>
(async function() {
    console.log('📍 Module ABF Adresse - Init');

    let clientId = null;
    let userProfile = null;

    // ── Mapping dates → opportunités ──
    const RENEWAL_MAP = [
        { dateId: 'dateRenouvHypotheque', reminderId: 'reminderHypotheque', statusId: 'statusHypotheque', category: 'renouv_hypothecaire', titlePrefix: 'Renouv. Hypothèque' },
        { dateId: 'dateAssuranceAuto',    reminderId: 'reminderAuto',       statusId: 'statusAuto',       category: 'renouv_auto',          titlePrefix: 'Renouv. Auto' },
        { dateId: 'dateAssuranceHabitation', reminderId: 'reminderHabitation', statusId: 'statusHabitation', category: 'renouv_habitation', titlePrefix: 'Renouv. Habitation' }
    ];

    const ACTIVE_STAGES = ['active', 'identified', 'qualified', 'action_planned', 'in_progress', 'proposal_sent'];

    function computeAutoActionDate(targetDateStr, days) {
        if (!targetDateStr) return null;
        if (!days || days === 0) return targetDateStr; // Date exacte, pas de décalage
        const target = new Date(targetDateStr + 'T00:00:00');
        const action = new Date(target);
        action.setDate(action.getDate() - days);
        const today = new Date();
        today.setHours(0,0,0,0);
        const final = action < today ? today : action;
        return final.toISOString().split('T')[0];
    }

    // ==========================================
    // 1. DÉFINIR TOUTES LES FONCTIONS D'ABORD
    // ==========================================

    window.toggleHypotheque = function() {
        const statut = document.querySelector('input[name="statutLogement"]:checked')?.value;
        const hypothequeItem = document.getElementById('hypothequeItem');

        if (hypothequeItem) {
            if (statut === 'Propriétaire') {
                hypothequeItem.style.opacity = '1';
                hypothequeItem.style.pointerEvents = 'auto';
            } else {
                hypothequeItem.style.opacity = '0.4';
                hypothequeItem.style.pointerEvents = 'none';
            }
        }
    };

    window.saveAndNext = async function() {
        console.log('💾 Sauvegarde Adresse et navigation...');

        const result = await window.saveModuleData();

        if (result.success) {
            FINOX.showNotification('Adresse sauvegardée', 'success');
            FINOX_NAV.markAsSaved();

            if (typeof FINOX_NAV?.updateABFCheckmarks === 'function') {
                FINOX_NAV.updateABFCheckmarks();
            }

            FINOX_NAV.loadModule('abf-emploi');
        } else {
            FINOX.showNotification('Erreur de sauvegarde: ' + result.error, 'error');
        }
    };

    function initGoogleMapsAutocomplete() {
        const input = document.getElementById('addressAutocomplete');

        if (typeof google === 'undefined' || !google.maps || !google.maps.places) {
            console.log('⏳ Google Maps pas encore prêt, retry dans 500ms...');
            setTimeout(initGoogleMapsAutocomplete, 500);
            return;
        }

        try {
            const autocomplete = new google.maps.places.Autocomplete(input, {
                componentRestrictions: { country: 'ca' },
                fields: ['address_components', 'formatted_address'],
                types: ['address']
            });

            autocomplete.addListener('place_changed', function() {
                const place = autocomplete.getPlace();
                if (!place.address_components) return;

                let streetNumber = '', streetName = '', city = '', province = '', postalCode = '';

                place.address_components.forEach(comp => {
                    const type = comp.types[0];
                    if (type === 'street_number') streetNumber = comp.long_name;
                    if (type === 'route') streetName = comp.long_name;
                    if (type === 'locality') city = comp.long_name;
                    if (type === 'administrative_area_level_1') province = comp.short_name;
                    if (type === 'postal_code') postalCode = comp.long_name;
                });

                document.getElementById('streetAddress').value = (streetNumber + ' ' + streetName).trim();
                document.getElementById('city').value = city;
                document.getElementById('province').value = province;
                document.getElementById('postalCode').value = postalCode;

                FINOX_NAV.markAsUnsaved();
            });
            console.log('✅ Google Maps Autocomplete initialisé');
        } catch (err) {
            console.error('❌ Erreur init Google Maps:', err);
        }
    }

    // ── SYNC RENEWAL → OPPORTUNITIES ──
    async function syncRenewalOpportunities() {
        if (!clientId || !userProfile) return;

        for (const mapping of RENEWAL_MAP) {
            const dateVal = document.getElementById(mapping.dateId).value || null;
            const reminderDays = parseInt(document.getElementById(mapping.reminderId).value) || 90;
            const statusEl = document.getElementById(mapping.statusId);

            if (!dateVal) {
                // Pas de date → vider le status
                statusEl.className = 'renewal-status';
                statusEl.innerHTML = '';
                continue;
            }

            try {
                // Chercher une opportunité existante pour ce client + catégorie (active)
                const { data: existing } = await FINOX.supabase
                    .from('client_opportunities')
                    .select('id, stage')
                    .eq('client_id', clientId)
                    .eq('category', mapping.category)
                    .in('stage', ACTIVE_STAGES)
                    .limit(1);

                const nextActionDate = computeAutoActionDate(dateVal, reminderDays);
                const clientData = FINOX.getClientData();
                const clientName = `${clientData?.first_name || ''} ${clientData?.last_name || ''}`.trim();
                const title = `${mapping.titlePrefix} — ${clientName}`;

                if (existing && existing.length > 0) {
                    // UPDATE existing opportunity
                    await FINOX.supabase
                        .from('client_opportunities')
                        .update({
                            target_date: dateVal,
                            next_action_date: nextActionDate
                        })
                        .eq('id', existing[0].id);

                    statusEl.className = 'renewal-status linked';
                    statusEl.innerHTML = reminderDays > 0
                        ? `✅ Opportunité mise à jour — rappel ${reminderDays}j avant`
                        : `✅ Opportunité mise à jour — date exacte`;
                } else {
                    // CREATE new opportunity
                    await FINOX.supabase
                        .from('client_opportunities')
                        .insert({
                            organization_id: userProfile.organization_id,
                            client_id: clientId,
                            conseiller_id: userProfile.id,
                            category: mapping.category,
                            title,
                            target_date: dateVal,
                            next_action_date: nextActionDate,
                            stage: 'active',
                            priority: 'normal',
                            source: 'abf_sync'
                        });

                    statusEl.className = 'renewal-status linked';
                    statusEl.innerHTML = reminderDays > 0
                        ? `✅ Opportunité créée — rappel ${reminderDays}j avant`
                        : `✅ Opportunité créée — date exacte`;
                }
            } catch (e) {
                console.error(`Erreur sync ${mapping.category}:`, e);
                statusEl.className = 'renewal-status';
                statusEl.innerHTML = `⚠️ Erreur sync`;
            }
        }
    }

    // ── CHECK EXISTING OPPS ON LOAD ──
    async function checkExistingOpportunities() {
        if (!clientId) return;

        for (const mapping of RENEWAL_MAP) {
            const statusEl = document.getElementById(mapping.statusId);
            const dateVal = document.getElementById(mapping.dateId).value;

            if (!dateVal) {
                statusEl.className = 'renewal-status';
                statusEl.innerHTML = '';
                continue;
            }

            try {
                const { data: existing } = await FINOX.supabase
                    .from('client_opportunities')
                    .select('id, target_date, next_action_date, stage')
                    .eq('client_id', clientId)
                    .eq('category', mapping.category)
                    .in('stage', ACTIVE_STAGES)
                    .limit(1);

                if (existing && existing.length > 0) {
                    // Déduire le rappel depuis les dates
                    const opp = existing[0];
                    if (opp.target_date && opp.next_action_date) {
                        const diff = Math.round((new Date(opp.target_date) - new Date(opp.next_action_date)) / 86400000);
                        const closest = [30, 60, 90, 120, 180].reduce((prev, curr) =>
                            Math.abs(curr - diff) < Math.abs(prev - diff) ? curr : prev
                        );
                        const reminderSelect = document.getElementById(mapping.reminderId);
                        if (reminderSelect) reminderSelect.value = String(closest);
                    }
                    statusEl.className = 'renewal-status linked';
                    statusEl.innerHTML = '✅ Opportunité liée';
                } else {
                    statusEl.className = 'renewal-status pending';
                    statusEl.innerHTML = '⚡ Créera une opportunité à la sauvegarde';
                }
            } catch (e) {
                console.warn('Check opp error:', e);
            }
        }
    }

    // ==========================================
    // 2. CHARGER DONNÉES CLIENT + PROFIL
    // ==========================================
    const client = await FINOX.loadClientData(true);
    if (!client) {
        console.error('❌ Aucun client trouvé');
        return;
    }

    clientId = client.id;
    console.log('📋 Client chargé:', client.first_name, client.last_name);

    // Charger le profil pour organization_id / conseiller_id
    const user = FINOX.getCurrentUser();
    if (user) {
        const { data: profile } = await FINOX.supabase
            .from('profiles')
            .select('id, organization_id, first_name, last_name')
            .eq('id', user.id)
            .single();
        userProfile = profile;
    }

    // ==========================================
    // 3. REMPLIR LES CHAMPS - COLONNES DIRECTES
    // ==========================================
    document.getElementById('dateRenouvHypotheque').value = client.date_renouv_hypotheque || '';
    document.getElementById('dateAssuranceAuto').value = client.date_assurance_auto || '';
    document.getElementById('dateAssuranceHabitation').value = client.date_assurance_habitation || '';

    document.getElementById('streetAddress').value = client.street_address || client.address || '';
    document.getElementById('city').value = client.city || '';
    document.getElementById('province').value = client.province || 'Québec';
    document.getElementById('postalCode').value = client.postal_code || '';

    // Statut logement
    const statut = client.statut_logement || 'Propriétaire';
    const radio = document.querySelector(`input[name="statutLogement"][value="${statut}"]`);
    if (radio) radio.checked = true;

    // ==========================================
    // 4. INITIALISER L'UI
    // ==========================================
    window.toggleHypotheque();
    initGoogleMapsAutocomplete();

    // Vérifier les opportunités existantes et afficher les statuts
    await checkExistingOpportunities();

    // ── Preview du rappel quand on change la date ──
    RENEWAL_MAP.forEach(mapping => {
        const dateInput = document.getElementById(mapping.dateId);
        const reminderSelect = document.getElementById(mapping.reminderId);
        const statusEl = document.getElementById(mapping.statusId);

        function updatePreview() {
            if (dateInput.value) {
                statusEl.className = 'renewal-status pending';
                statusEl.innerHTML = '⚡ Sauvegarder pour créer/mettre à jour l\'opportunité';
            } else {
                statusEl.className = 'renewal-status';
                statusEl.innerHTML = '';
            }
        }

        dateInput.addEventListener('change', updatePreview);
        reminderSelect.addEventListener('change', updatePreview);
    });

    // ==========================================
    // 5. FONCTION DE SAUVEGARDE POUR AUTO-SAVE
    // ==========================================
    window.saveModuleData = async function() {
        console.log('💾 saveModuleData Adresse appelé');

        // Récupérer abf_data existant pour ne pas l'écraser
        const currentClient = FINOX.getClientData();
        const currentAbfData = currentClient?.abf_data || {};

        const clientUpdate = {
            date_renouv_hypotheque: document.getElementById('dateRenouvHypotheque').value || null,
            date_assurance_auto: document.getElementById('dateAssuranceAuto').value || null,
            date_assurance_habitation: document.getElementById('dateAssuranceHabitation').value || null,
            statut_logement: document.querySelector('input[name="statutLogement"]:checked')?.value || 'Propriétaire',
            street_address: document.getElementById('streetAddress').value,
            address: document.getElementById('streetAddress').value,
            city: document.getElementById('city').value,
            province: document.getElementById('province').value,
            postal_code: document.getElementById('postalCode').value,

            abf_data: {
                ...currentAbfData
            }
        };

        try {
            const { error } = await FINOX.supabase
                .from('clients')
                .update(clientUpdate)
                .eq('id', clientId);

            if (error) throw error;

            FINOX.updateClientDataCache(clientUpdate);
            FINOX.invalidateCache();
            await FINOX.loadClientData();

            // ── SYNC: Créer/mettre à jour les opportunités de renouvellement ──
            await syncRenewalOpportunities();

            return { success: true };
        } catch (err) {
            console.error('Erreur sauvegarde:', err);
            return { success: false, error: err.message };
        }
    };

    // ==========================================
    // 6. DÉTECTER LES CHANGEMENTS
    // ==========================================
    const inputs = document.querySelectorAll('#module-content input, #module-content select');
    inputs.forEach(input => {
        input.addEventListener('input', () => FINOX_NAV.markAsUnsaved());
        input.addEventListener('change', () => FINOX_NAV.markAsUnsaved());
    });

    // Limiter les champs date à 4 chiffres pour l'année
    if (typeof FINOX.setupAllDateInputs === 'function') {
        FINOX.setupAllDateInputs();
    }

    console.log('✅ Module ABF Adresse chargé');
})();
</script>
